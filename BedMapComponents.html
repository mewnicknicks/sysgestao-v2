
<script>
  (function() {
    window.App = window.App || {};

    var STATUS_CONFIG = {
      AVAILABLE: { label: 'Vago', classes: 'bed-box bed-available', icon: 'ph-check' },
      OCCUPIED: { label: 'Ocupado', classes: 'bed-box bed-occupied', icon: 'ph-user' },
      CLEANING: { label: 'Higienização', classes: 'bed-box bed-cleaning animate-pulse', icon: 'ph-broom' },
      MAINTENANCE: { label: 'Bloqueado', classes: 'bed-box bed-maintenance', icon: 'ph-wrench' },
      RESERVED: { label: 'Reservado', classes: 'bed-box bed-reserved', icon: 'ph-lock-key' }
    };

    var BedBox = function(props) {
      var bed = props.bed;
      var sectorName = props.sectorName;
      var handleBedClick = props.handleBedClick;
      var handleMouseEnter = props.handleMouseEnter;
      var setHoveredBed = props.setHoveredBed;
      var getElapsedDuration = props.getElapsedDuration;
      var config = STATUS_CONFIG[bed.status] || STATUS_CONFIG.AVAILABLE;
      return React.createElement('div', {
        onClick: function(e) { handleBedClick(e, bed, sectorName); },
        onMouseEnter: function(e) { handleMouseEnter(e, bed); },
        onMouseLeave: function() { setHoveredBed(null); },
        className: config.classes + ' active:scale-95 group/bed relative'
      },
        (bed.status === 'CLEANING' || bed.status === 'MAINTENANCE') && bed.data && bed.data.date &&
          React.createElement('span', {
            className: 'absolute -top-2 -right-2 text-white text-[8px] font-black px-1.5 py-0.5 rounded-md shadow-md z-20 border ' + (bed.status === 'CLEANING' ? 'bg-purple-600 border-purple-400 animate-pulse' : 'bg-rose-600 border-rose-400')
          }, getElapsedDuration(bed.data.date) || "?"),
        React.createElement('i', { className: 'ph-bold ' + config.icon + ' text-lg mb-1 opacity-90 group-hover/bed:opacity-100 transition-opacity' }),
        React.createElement('span', { className: 'text-xs font-black tracking-tight pointer-events-none' }, String(bed.number).replace(/[A-Z]/g, ''))
      );
    };

    var SectorCard = function(props) {
      var sector = props.sector;
      var handleBedClick = props.handleBedClick;
      var handleMouseEnter = props.handleMouseEnter;
      var setHoveredBed = props.setHoveredBed;
      var getElapsedDuration = props.getElapsedDuration;
      return React.createElement('div', { className: 'nx-map-sector-card group flex flex-col' },
        React.createElement('div', { className: 'flex items-center justify-between mb-4 pb-2 border-b border-[var(--nx-border)] z-10 relative' },
          React.createElement('div', { className: 'flex items-center' },
            React.createElement('i', { className: 'ph-bold ' + (['CTI','UTI','CETIPE'].some(function(k){return sector.type.includes(k)}) ? 'ph-heartbeat text-rose-500' : 'ph-grid-four text-cyan-500') + ' mr-2' }),
            React.createElement('h3', { className: 'font-black text-[var(--nx-text-primary)] text-sm uppercase tracking-wider truncate', title: sector.name }, sector.name)
          ),
          React.createElement('div', { className: 'flex items-center gap-1' },
            React.createElement('span', { className: 'text-[9px] font-black text-blue-900 bg-cyan-400 px-1.5 py-0.5 rounded border border-cyan-500/20', title: 'Vagos' }, sector.stats ? sector.stats.free : 0),
            React.createElement('span', { className: 'text-[9px] font-black text-cyan-400 bg-blue-900 px-1.5 py-0.5 rounded border border-blue-500/20', title: 'Total' }, sector.beds.length)
          )
        ),
        React.createElement('div', { className: 'grid grid-cols-4 gap-2 z-10 relative content-start' },
          sector.beds.map(function(bed) {
            return React.createElement(BedBox, {
              key: bed.number,
              bed: bed,
              sectorName: sector.name,
              handleBedClick: handleBedClick,
              handleMouseEnter: handleMouseEnter,
              setHoveredBed: setHoveredBed,
              getElapsedDuration: getElapsedDuration
            });
          })
        )
      );
    };

    var BedListItem = function(props) {
      var bed = props.bed;
      var sectorName = props.sectorName;
      var handleBedClick = props.handleBedClick;
      var getElapsedDuration = props.getElapsedDuration;
      var st = bed.status;
      var config = STATUS_CONFIG[st];
      return React.createElement('div', {
        onClick: function(e) { handleBedClick(e, bed, sectorName); },
        className: 'relative flex items-center p-3 rounded-xl bg-[var(--nx-bg-card)] border border-[var(--nx-border)] hover:border-blue-500/50 hover:bg-blue-50 dark:hover:bg-white/5 transition-all cursor-pointer group select-none shadow-sm'
      },
        React.createElement('div', { className: 'w-12 h-12 rounded-lg flex items-center justify-center text-lg font-black bg-blue-50 dark:bg-slate-900 border border-blue-100 dark:border-slate-800 shrink-0 mr-4 ' + (st === 'AVAILABLE' ? 'text-emerald-500' : st === 'OCCUPIED' ? 'text-blue-900 dark:text-white' : 'text-blue-400 dark:text-slate-500') }, bed.number),
        React.createElement('div', { className: 'flex flex-col min-w-0' },
          React.createElement('span', { className: 'text-xs font-black uppercase truncate ' + (st === 'OCCUPIED' ? 'text-blue-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-cyan-400' : 'text-blue-400 dark:text-slate-500') }, st === 'OCCUPIED' ? bed.data.name : config.label),
          st === 'OCCUPIED' && React.createElement('span', { className: 'text-[9px] text-blue-400 dark:text-slate-500 font-bold uppercase tracking-wider' }, bed.data.insurance),
          (st === 'MAINTENANCE' || st === 'RESERVED') && React.createElement('span', { className: 'text-[9px] text-rose-400 font-bold uppercase truncate' }, bed.data.reason),
          st === 'AVAILABLE' && bed.characteristics && React.createElement('span', { className: 'text-[8px] text-emerald-400 font-medium italic mt-0.5 truncate' }, bed.characteristics),
          (st === 'CLEANING' || st === 'MAINTENANCE') && React.createElement('div', { className: 'flex items-center gap-2 mt-1' },
            React.createElement('span', { className: 'text-[9px] font-bold px-1.5 py-0.5 rounded border flex items-center gap-1 ' + (st === 'CLEANING' ? 'bg-purple-950/30 text-purple-400 border-purple-500/30' : 'bg-slate-800 text-slate-400 border-slate-600') },
              React.createElement('i', { className: 'ph-bold ph-timer' }), ' ', getElapsedDuration(bed.data.date) || "--"
            )
          )
        ),
        st === 'OCCUPIED' && React.createElement('i', { className: 'ph-bold ph-caret-right ml-auto text-blue-300 dark:text-slate-700 group-hover:text-blue-500 dark:group-hover:text-cyan-500 transition-colors' })
      );
    };

    window.App.BedMapComponents = {
      STATUS_CONFIG: STATUS_CONFIG,
      BedBox: BedBox,
      SectorCard: SectorCard,
      BedListItem: BedListItem
    };
  })();
</script>
