<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <h1 class="text-2xl font-bold mb-6">MODO SANDBOX: SIMULAÇÃO REALISTA</h1>
    
    <div class="flex gap-4 mb-6">
        <button onclick="runSimulation()" class="bg-blue-600 hover:bg-blue-700 p-4 rounded-lg font-bold">
            SIMULAR DIA COMPLETO
        </button>
        <button onclick="clearData()" class="bg-red-600 hover:bg-red-700 p-4 rounded-lg font-bold">
            LIMPAR DADOS DE TESTE
        </button>
    </div>

    <div id="reportArea" class="p-4 bg-slate-800 rounded-lg border border-slate-700">
        <p class="text-slate-400">Aguardando simulação...</p>
    </div>

    <script>
        function runSimulation() {
            document.getElementById('reportArea').innerText = "Processando simulação...";
            google.script.run.withSuccessHandler(showReport).simulateFullDay();
        }

        function clearData() {
            document.getElementById('reportArea').innerText = "Limpando dados...";
            google.script.run.withSuccessHandler(showReport).clearSimulationData();
        }

        function showReport(report) {
            document.getElementById('reportArea').innerHTML = `
                <h2 class="text-xl font-bold mb-2">Ação Concluída!</h2>
                <pre class="bg-black p-4 rounded">${typeof report === 'string' ? report : JSON.stringify(report, null, 2)}</pre>
            `;
        }
    </script>
</body>
</html>
