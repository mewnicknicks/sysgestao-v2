    <!-- THEME INIT (antes de qualquer renderização — evita flash de light mode) -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('nx-theme');
          if (saved !== 'light') {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          // Sem localStorage → default é dark
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- CONFIGURAÇÃO INICIAL -->
    <script>
      window.App = {
        UI: {}, Utils: {}, Charts: {}, News: {}, INSURANCE_OPTIONS: [],
        STRUCTURE: { sectors: [], beds: [], flows: [], classes: [], groups: [], specialties: [] },
        DEBUG: true,
        safeStorage: {
            getItem: function(key, useLocalStorage = false) {
                try { return useLocalStorage ? localStorage.getItem(key) : sessionStorage.getItem(key); }
                catch (e) { return this.memoryStorage ? this.memoryStorage[key] : null; }
            },
            setItem: function(key, value, useLocalStorage = false) {
                try { useLocalStorage ? localStorage.setItem(key, value) : sessionStorage.setItem(key, value); }
                catch (e) { 
                    this.memoryStorage = this.memoryStorage || {};
                    this.memoryStorage[key] = value;
                }
            },
            removeItem: function(key, useLocalStorage = false) {
                try { useLocalStorage ? localStorage.removeItem(key) : sessionStorage.removeItem(key); }
                catch (e) { 
                    if (this.memoryStorage) delete this.memoryStorage[key];
                }
            },
            memoryStorage: {}
        },
        Logger: {
          _queue: [],
          log: function(...args) { this._queue.push(['info', ...args]); },
          info: function(...args) { this._queue.push(['info', ...args]); },
          warn: function(...args) { this._queue.push(['warn', ...args]); },
          error: function(...args) { this._queue.push(['error', ...args]); },
          debug: function(...args) { this._queue.push(['debug', ...args]); },
        }
      };
    </script>

    <!-- BOOTSTRAPPER -->
    <script>
      (function() {
        var attempts = 0;
        var maxAttempts = 300; 
        
        var checkReady = setInterval(function() {
          attempts++;
          
          var checks = {
            'React': !!window.React,
            'DOM': !!window.ReactDOM,
            'App': !!(window.App && window.App.MainApp)
          };

          if (Object.values(checks).every(Boolean)) {
            clearInterval(checkReady);
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(window.App.MainApp));
          } else if (attempts > maxAttempts) {
            clearInterval(checkReady);
            document.getElementById('root').innerHTML = '<div style="color:red;padding:20px">Erro: Falha ao carregar módulos.</div>';
          }
        }, 100);
      })();
    </script>
