
<script>
  (function() {
    window.App = window.App || {};
    window.App.Context = {};

    // 1. Definição dos Contextos Específicos
    // Isso evita que componentes pequenos re-renderizem quando dados irrelevantes mudam.
    
    const AuthContext = React.createContext(null);
    const UIContext = React.createContext(null);
    const DataContext = React.createContext(null);
    const SystemContext = React.createContext(null);
    const NotificationContext = React.createContext(null);

    // 2. Hooks Customizados para Consumo Seguro
    
    const useAuth = () => {
        const context = React.useContext(AuthContext);
        if (!context) throw new Error("useAuth deve ser usado dentro de um AuthProvider.");
        return context;
    };

    const useUI = () => {
        const context = React.useContext(UIContext);
        if (!context) throw new Error("useUI deve ser usado dentro de um UIProvider.");
        return context;
    };

    const useData = () => {
        const context = React.useContext(DataContext);
        if (!context) throw new Error("useData deve ser usado dentro de um DataProvider.");
        return context;
    };

    const useSystem = () => {
        const context = React.useContext(SystemContext);
        if (!context) throw new Error("useSystem deve ser usado dentro de um SystemProvider.");
        return context;
    };

    const useNotifications = () => {
        const context = React.useContext(NotificationContext);
        if (!context) throw new Error("useNotifications deve ser usado dentro de um NotificationProvider.");
        return context;
    };

    // 3. Compatibilidade: useAppContext (Mantido para não quebrar código legado, mas marcado como depreciado)
    // Nota: O uso deste hook ainda causará re-renderizações globais. Recomenda-se migrar para os hooks específicos.
    const useAppContext = () => {
        const auth = React.useContext(AuthContext);
        const ui = React.useContext(UIContext);
        const data = React.useContext(DataContext);
        const system = React.useContext(SystemContext);
        const notifications = React.useContext(NotificationContext);
        
        return React.useMemo(() => ({
            ...auth,
            ...ui,
            ...data,
            ...system,
            ...notifications
        }), [auth, ui, data, system, notifications]);
    };

    // 4. Exportação
    window.App.Context = {
        AuthContext,
        UIContext,
        DataContext,
        SystemContext,
        NotificationContext,
        useAuth,
        useUI,
        useData,
        useSystem,
        useNotifications,
        useAppContext // Legado
    };
  })();
</script>
