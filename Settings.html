
<script>
  (function() {
    window.App = window.App || {};

    var SettingsView = function(props) {
      var user = props.user;
      var usersList = props.usersList;
      var structure = props.structure;
      var actions = props.actions;
      var UI = props.UI;
      var Service = props.Service;
      var Hooks = props.Hooks;

      var activeTabState = React.useState('USERS');
      var activeTab = activeTabState[0];
      var setActiveTab = activeTabState[1];
      
      // UX OTIMISTA & BUFFER
      var optimisticResult = Hooks.useOptimisticAction();
      var isOptimistic = optimisticResult.isOptimistic;
      var runOptimistic = optimisticResult.run;

      // ESTADOS LOCAIS (Sync com Context via Hook Otimista)
      var usersLocalState = Hooks.useLocalState(usersList || [], isOptimistic);
      var users = usersLocalState[0];
      var setUsers = usersLocalState[1];
      var bedsLocalState = Hooks.useLocalState(structure && structure.beds ? structure.beds : [], isOptimistic);
      var beds = bedsLocalState[0];
      var setBeds = bedsLocalState[1];
      var sectorsLocalState = Hooks.useLocalState(structure && structure.sectors ? structure.sectors : [], isOptimistic);
      var sectors = sectorsLocalState[0];
      var setSectors = sectorsLocalState[1];
      var insurancesLocalState = Hooks.useLocalState(structure && structure.insurances ? structure.insurances : [], isOptimistic);
      var insurances = insurancesLocalState[0];
      var setInsurances = insurancesLocalState[1];
      var specialtiesLocalState = Hooks.useLocalState(structure && structure.specialties ? structure.specialties : [], isOptimistic);
      var specialties = specialtiesLocalState[0];
      var setSpecialties = specialtiesLocalState[1];
      
      // AI Config State
      var aiConfigState = React.useState({
          MODEL: (structure && structure.aiConfig && structure.aiConfig.MODEL) ? structure.aiConfig.MODEL : 'gemini-3-flash-preview',
          PROMPT_SHIFT: (structure && structure.aiConfig && structure.aiConfig.PROMPT_SHIFT) ? structure.aiConfig.PROMPT_SHIFT : '',
          PROMPT_EDITOR: (structure && structure.aiConfig && structure.aiConfig.PROMPT_EDITOR) ? structure.aiConfig.PROMPT_EDITOR : ''
      });
      var aiConfig = aiConfigState[0];
      var setAiConfig = aiConfigState[1];
      
      var userFormDataState = React.useState({ id: '', name: '', matricula: '', leader: '', role: '', isAdmin: 'NAO' });
      var userFormData = userFormDataState[0];
      var setUserFormData = userFormDataState[1];
      var isUserEditingState = React.useState(false);
      var isUserEditing = isUserEditingState[0];
      var setIsUserEditing = isUserEditingState[1];
      
      var sectorModeState = React.useState('BEDS');
      var sectorMode = sectorModeState[0];
      var setSectorMode = sectorModeState[1];
      
      // --- FORM DATA LEITOS V8 ---
      var bedFormDataState = React.useState({ 
          number: '', sector: '', type: '', 
          sla: 120, isStrategic: false, isCti: false 
      });
      var bedFormData = bedFormDataState[0];
      var setBedFormData = bedFormDataState[1];
      var isBedEditingState = React.useState(false);
      var isBedEditing = isBedEditingState[0];
      var setIsBedEditing = isBedEditingState[1];
      
      var newSectorNameState = React.useState('');
      var newSectorName = newSectorNameState[0];
      var setNewSectorName = newSectorNameState[1];
      var newInsuranceNameState = React.useState('');
      var newInsuranceName = newInsuranceNameState[0];
      var setNewInsuranceName = newInsuranceNameState[1];
      var newSpecialtyNameState = React.useState('');
      var newSpecialtyName = newSpecialtyNameState[0];
      var setNewSpecialtyName = newSpecialtyNameState[1];
      
      var showMenuState = React.useState(false);
      var showMenu = showMenuState[0];
      var setShowMenu = showMenuState[1];
      var submitResult = (UI.useSubmit ? UI.useSubmit() : { isSubmitting: false, submit: async function(fn) { return await fn(); } });
      var isSubmitting = submitResult.isSubmitting;
      var submit = submitResult.submit;
      
      // --- ESTADOS DIAGNÓSTICO & RESET ---
      var diagResultState = React.useState(null);
      var diagResult = diagResultState[0];
      var setDiagResult = diagResultState[1];
      var showResetModalState = React.useState(false);
      var showResetModal = showResetModalState[0];
      var setShowResetModal = showResetModalState[1];
      var resetConfirmTextState = React.useState('');
      var resetConfirmText = resetConfirmTextState[0];
      var setResetConfirmText = resetConfirmTextState[1];
      var isResettingState = React.useState(false);
      var isResetting = isResettingState[0];
      var setIsResetting = isResettingState[1];

      // DnD State
      var dragItem = React.useRef(null);
      var dragOverInfoState = React.useState({ index: null, position: null });
      var dragOverInfo = dragOverInfoState[0];
      var setDragOverInfo = dragOverInfoState[1];

      // --- DIAGNÓSTICO ---
      var handleDiagnostic = async function() {
          setDiagResult(null);
          if(UI.Toast) UI.Toast.show("Executando diagnóstico...", "warning");
          
          try {
              var res = await actions.diagnoseSystem();
              if (res.status === 'SUCCESS') {
                  setDiagResult({ success: true, message: 'Conexão Estável!\nBanco de Dados: ' + res.dbName });
                  if(UI.Toast) UI.Toast.show("Diagnóstico OK", "success");
              } else {
                  var errorMsg = res.error || 'Resposta inesperada do servidor.';
                  setDiagResult({ success: false, message: 'Erro: ' + errorMsg });
                  if(UI.Toast) UI.Toast.show("Falha no diagnóstico", "error");
              }
          } catch(e) { 
              var errorMsg = e.message || 'Não foi possível conectar ao servidor.';
              setDiagResult({ success: false, message: 'Erro Fatal: ' + errorMsg });
          }
      };

      // --- FACTORY RESET (DISASTER RECOVERY) ---
      var handleFactoryReset = async function() {
          if (!resetConfirmText || resetConfirmText.toUpperCase() !== 'CONFIRMAR') {
              if (UI.Toast && UI.Toast.show) UI.Toast.show("❌ Digite 'CONFIRMAR' corretamente para prosseguir.", "warning");
              return;
          }
          
          var okReset = await UI.confirmThen("⚠️ ÚLTIMA CHANCE: Todos os dados de pacientes serão ARQUIVADOS e um novo banco será criado. Continuar?");
          if (!okReset) {
              if (UI.Toast && UI.Toast.show) UI.Toast.show("❌ Reset cancelado.", "info");
              return;
          }

          setIsResetting(true);
          if (UI.Toast && UI.Toast.show) UI.Toast.show("⏳ Executando reset... Isso pode levar alguns segundos.", "loading");
          
          try {
              var adminRef = Service.Admin;
              var factoryResetFn = adminRef ? adminRef.factoryReset : null;
              var res = factoryResetFn ? await factoryResetFn(user) : null;
              
              if (res && res.status === 'SUCCESS') {
                  if (UI.Toast && UI.Toast.show) UI.Toast.show('✅ Banco de dados resetado! ID novíssimo: ' + res.newId, "success");
                  setTimeout(function() { window.top.location.reload(); }, 2000);
              } else {
                  throw new Error((res && res.message) ? res.message : "Erro desconhecido durante o reset");
              }
          } catch (e) {
              console.error("Factory Reset Error:", e);
              if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro no reset: ' + e.message, "error");
              setIsResetting(false);
              setShowResetModal(false);
              setResetConfirmText('');
          }
      };

      // --- HANDLERS USUÁRIOS ---
      var handleUserSubmit = function(e) {
          e.preventDefault();
          var id = userFormData.id || String(Date.now());
          var newUser = Object.assign({}, userFormData, { id: id });
          
          runOptimistic(
              function() {
                  var updated = isUserEditing ? users.map(function(u) { return u.id === id ? newUser : u; }) : [newUser].concat(users);
                  setUsers(updated);
                  setUserFormData({id:'', name:'', matricula:'', leader:'', role:'', isAdmin: 'NAO'});
                  setIsUserEditing(false);
                  if(UI.Toast) UI.Toast.show("Usuário salvo.");
              },
              function() { return actions.saveUser(newUser); },
              {
                  onError: function(e) {
                      setUsers(usersList);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      var handleDeleteUser = async function(u) {
          var ok = await UI.confirmThen('Excluir usuário ' + u.name + '?');
          if (!ok) return;
          runOptimistic(
              function() {
                  var updated = users.filter(function(it) { return it.id !== u.id; });
                  setUsers(updated);
                  if(UI.Toast) UI.Toast.show("Usuário removido.");
              },
              function() { return actions.deleteUser(u.id); },
              {
                  onError: function(e) {
                      setUsers(usersList);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      // --- HANDLERS LEITOS (V8 JSON) ---
      var handleBedSubmit = function(e) {
          e.preventDefault();
          
          var newBed = {
              id: bedFormData.number,
              number: bedFormData.number,
              sector: bedFormData.sector,
              type: bedFormData.type,
              sla: bedFormData.sla,
              isStrategic: bedFormData.isStrategic,
              isCti: bedFormData.isCti,
              _rawJson: JSON.stringify({
                  sla_min: parseInt(bedFormData.sla),
                  is_strategic: bedFormData.isStrategic,
                  is_cti: bedFormData.isCti
              })
          };
          
          runOptimistic(
              function() {
                  var updated = beds.filter(function(b) { return b.number !== newBed.number; });
                  updated.push(newBed);
                  updated.sort(function(a,b) { return String(a.number).localeCompare(String(b.number), undefined, {numeric: true}); });
                  
                  setBeds(updated);
                  setBedFormData({ number: '', sector: '', type: '', sla: 120, isStrategic: false, isCti: false });
                  setIsBedEditing(false);
                  if(UI.Toast) UI.Toast.show("Leito salvo (V8).");
              },
              function() { return actions.saveStructureBed(newBed); },
              {
                  onError: function(e) {
                      setBeds(structure && structure.beds ? structure.beds : []);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      var prepareEditBed = function(bed) {
          setBedFormData({
              number: bed.number,
              sector: bed.sector,
              type: bed.type,
              sla: bed.sla || 120,
              isStrategic: !!bed.isStrategic,
              isCti: !!bed.isCti
          });
          setIsBedEditing(true);
      };

      var handleDeleteBed = async function(bedNum) {
          var ok = await UI.confirmThen('Excluir leito ' + bedNum + '?');
          if (!ok) return;
          runOptimistic(
              function() {
                  var updated = beds.filter(function(it) { return it.number !== bedNum; });
                  setBeds(updated);
                  if(UI.Toast) UI.Toast.show("Leito excluído.");
              },
              function() { return actions.deleteStructureBed(bedNum); },
              {
                  onError: function(e) {
                      setBeds(structure && structure.beds ? structure.beds : []);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      // --- HANDLERS SETORES ---
      var handleCreateSector = function(e) {
          e.preventDefault();
          var name = newSectorName.toUpperCase().trim();
          if (!name || sectors.find(function(s) { return s.name === name; })) return;
          
          var newOrder = (sectors.length > 0 ? Math.max.apply(null, sectors.map(function(s) { return s.order || 0; })) : 0) + 10;
          var newSec = { name: name, order: newOrder, beds: [] };

          runOptimistic(
              function() {
                  var updated = sectors.concat([newSec]);
                  setSectors(updated);
                  setNewSectorName('');
                  if(UI.Toast) UI.Toast.show("Setor criado.");
              },
              function() { return actions.saveSectorOrder(name, newOrder); },
              {
                  onError: function(e) {
                      setSectors(structure && structure.sectors ? structure.sectors : []);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      var handleDeleteSector = async function(name) {
          var ok = await UI.confirmThen('Atenção: Excluir o setor "' + name + '" e todos os seus leitos associados?');
          if (!ok) return;
          runOptimistic(
              function() {
                  var updatedSectors = sectors.filter(function(s) { return s.name !== name; });
                  var updatedBeds = beds.filter(function(b) { return b.sector !== name; });
                  setSectors(updatedSectors);
                  setBeds(updatedBeds);
                  if(UI.Toast) UI.Toast.show("Setor excluído.");
              },
              function() { return actions.deleteSector(name); },
              {
                  onError: function(e) {
                      setSectors(structure && structure.sectors ? structure.sectors : []);
                      setBeds(structure && structure.beds ? structure.beds : []);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      // --- HANDLERS CONVÊNIOS ---
      var handleCreateInsurance = function(e) {
          e.preventDefault();
          var name = newInsuranceName.toUpperCase().trim();
          if (!name || insurances.find(function(i) { return i.name === name; })) return;
          var newOrder = (insurances.length > 0 ? Math.max.apply(null, insurances.map(function(i) { return i.order || 0; })) : 0) + 10;
          var newIns = { name: name, order: newOrder };

          runOptimistic(
              function() {
                  var updated = insurances.concat([newIns]);
                  setInsurances(updated);
                  setNewInsuranceName('');
                  if(UI.Toast) UI.Toast.show("Convênio criado.");
              },
              function() { return actions.saveInsurance(newIns); },
              {
                  onError: function(e) {
                      setInsurances(structure && structure.insurances ? structure.insurances : []);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      var handleDeleteInsurance = async function(name) {
          var ok = await UI.confirmThen("Excluir este convênio?");
          if (!ok) return;
          runOptimistic(
              function() {
                  var updated = insurances.filter(function(i) { return i.name !== name; });
                  setInsurances(updated);
                  if(UI.Toast) UI.Toast.show("Convênio excluído.");
              },
              function() { return actions.deleteInsurance(name); },
              {
                  onError: function(e) {
                      setInsurances(structure && structure.insurances ? structure.insurances : []);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      // --- HANDLERS ESPECIALIDADES ---
      var handleCreateSpecialty = function(e) {
          e.preventDefault();
          var name = newSpecialtyName.toUpperCase().trim();
          if (!name || specialties.find(function(s) { return s.name === name; })) return;
          var newOrder = (specialties.length > 0 ? Math.max.apply(null, specialties.map(function(s) { return s.order || 0; })) : 0) + 10;
          var newSpec = { name: name, order: newOrder };

          runOptimistic(
              function() {
                  var updated = specialties.concat([newSpec]);
                  setSpecialties(updated);
                  setNewSpecialtyName('');
                  if(UI.Toast) UI.Toast.show("Especialidade criada.");
              },
              function() { return actions.saveSpecialty(newSpec); },
              {
                  onError: function(e) {
                      setSpecialties(structure && structure.specialties ? structure.specialties : []);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };

      var handleDeleteSpecialty = async function(name) {
          var ok = await UI.confirmThen("Excluir esta especialidade?");
          if (!ok) return;
          runOptimistic(
              function() {
                  var updated = specialties.filter(function(s) { return s.name !== name; });
                  setSpecialties(updated);
                  if(UI.Toast) UI.Toast.show("Especialidade excluída.");
              },
              function() { return actions.deleteSpecialty(name); },
              {
                  onError: function(e) {
                      setSpecialties(structure && structure.specialties ? structure.specialties : []);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
      };
      
      // --- HANDLER IA CONFIG ---
      var handleSaveAiConfig = async function() {
          if(UI.Toast) UI.Toast.show("Salvando configurações de IA...", "info");
          try {
              await actions.saveAiConfig('MODEL', aiConfig.MODEL);
              await actions.saveAiConfig('PROMPT_SHIFT', aiConfig.PROMPT_SHIFT);
              await actions.saveAiConfig('PROMPT_EDITOR', aiConfig.PROMPT_EDITOR);
              if(UI.Toast) UI.Toast.show("Configurações de IA salvas!", "success");
          } catch(e) {
              if(UI.Toast) UI.Toast.show("Erro ao salvar IA config.", "error");
          }
      };

      // --- DND GENÉRICO ---
      var handleDragStart = function(e, index) { dragItem.current = index; e.dataTransfer.effectAllowed = 'move'; e.target.classList.add('opacity-40'); };
      var handleDragOver = function(e, index) { e.preventDefault(); if (dragItem.current === index) { setDragOverInfo({ index: null, position: null }); return; } var rect = e.currentTarget.getBoundingClientRect(); var position = (e.clientY - rect.top) < (rect.bottom - rect.top) / 2 ? 'top' : 'bottom'; setDragOverInfo({ index: index, position: position }); };
      var handleDragEnd = function(e) { e.target.classList.remove('opacity-40'); setDragOverInfo({ index: null, position: null }); };
      
      var handleDropGeneric = function(e, list, setList, saveFn, type) {
          e.preventDefault();
          var draggedIndex = dragItem.current;
          var targetIndex = dragOverInfo.index;
          var position = dragOverInfo.position;
          if (draggedIndex === null || targetIndex === null) return;

          var sorted = list.slice().sort(function(a,b) { return (a.order || 0) - (b.order || 0); });
          var itemToMove = sorted[draggedIndex];
          sorted.splice(draggedIndex, 1);
          var insertAtIndex = targetIndex;
          if (draggedIndex < targetIndex) insertAtIndex = targetIndex - 1;
          if (position === 'bottom') insertAtIndex += 1;

          sorted.splice(insertAtIndex, 0, itemToMove);
          var updated = sorted.map(function(s, i) { return Object.assign({}, s, { order: (i + 1) * 10 }); });
          
          runOptimistic(
              function() {
                  setList(updated);
                  if(UI.Toast) UI.Toast.show("Ordem atualizada.");
              },
              async function() {
                  for (var j = 0; j < updated.length; j++) {
                      var s = updated[j];
                      await saveFn(type === 'SECTOR' ? s.name : s, s.order); 
                  }
              },
              {
                  onError: function(e) {
                      setList(list);
                      if (UI.Toast && UI.Toast.show) UI.Toast.show('❌ Erro: ' + e.message, 'error');
                  }
              }
          );
          setDragOverInfo({ index: null, position: null }); dragItem.current = null;
      };

      var navTabs = [
          { id: 'USERS', label: 'Equipe', icon: 'ph-users-three' },
          { id: 'SECTORS', label: 'Infraestrutura', icon: 'ph-hospital' },
          { id: 'INSURANCES', label: 'Convênios', icon: 'ph-identification-card' },
          { id: 'SPECIALTIES', label: 'Especialidades', icon: 'ph-stethoscope' },
          { id: 'AI', label: 'Inteligência Art.', icon: 'ph-robot' },
          { id: 'SYSTEM', label: 'Sistema', icon: 'ph-gear' }
      ];

      var permissionsList = [
          {id: 'GLOBAL', label: 'Cenário Global'},
          {id: 'BED_MAP', label: 'Mapa de Leitos'},
          {id: 'PATIENT_REGISTER', label: 'Registro Pacientes'},
          {id: 'TRANSFER', label: 'Transferências'},
          {id: 'PA_CONTROL', label: 'Controle P.A.'},
          {id: 'DISCHARGE_DEATH', label: 'Altas / Óbitos'},
          {id: 'FORECAST', label: 'Previsão'},
          {id: 'SHIFT_HANDOVER', label: 'Plantão'},
          {id: 'REPORTS', label: 'Relatórios'},
          {id: 'AUDIT_LOG', label: 'Auditoria'},
          {id: 'SETTINGS', label: 'Configurações'}
      ];

      // --- HELPERS ---
      var _classTabBtn = function(mode) { return 'nx-settings-tab-btn ' + (sectorMode === mode ? 'active' : ''); };
      var _classTabActive = function(tabId) { return 'pb-4 text-xs font-black uppercase tracking-[0.2em] flex items-center gap-2 transition-all relative ' + (activeTab === tabId ? 'text-blue-900 dark:text-white' : 'text-blue-600/60 hover:text-blue-400'); };

      // --- RENDER: USERS TAB ---
      var renderUsersTab = function() {
          if (activeTab !== 'USERS') return null;
          return React.createElement('div', { className: 'nx-settings-grid' },
              // FORMULÁRIO
              React.createElement('div', { className: 'nx-settings-form-col' },
                  React.createElement(UI.Card, { className: 'p-8 h-full overflow-y-auto custom-scrollbar' },
                      React.createElement('div', { className: 'nx-settings-card-header' },
                          React.createElement('i', { className: 'ph-bold ph-user-gear nx-settings-card-header-icon' }),
                          React.createElement('h2', { className: 'nx-settings-card-header-title' }, "Gerenciar Usuário")
                      ),
                      React.createElement('form', { onSubmit: handleUserSubmit },
                          React.createElement('div', { className: 'mb-5' },
                              React.createElement(UI.Input, { label: 'Nome Completo', name: 'name', value: userFormData.name, onChange: function(e) { setUserFormData(Object.assign({}, userFormData, { name: e.target.value.toUpperCase() })); }, required: true, icon: 'ph-user' })
                          ),
                          React.createElement('div', { className: 'mb-5' },
                              React.createElement(UI.Input, { label: 'Matrícula', name: 'matricula', value: userFormData.matricula, onChange: function(e) { setUserFormData(Object.assign({}, userFormData, { matricula: e.target.value.toUpperCase() })); }, required: true, icon: 'ph-identification-card' })
                          ),
                          React.createElement('div', { className: 'grid grid-cols-2 gap-x-6 mb-5' },
                              React.createElement(UI.Input, { label: 'Cargo', name: 'role', value: userFormData.role, onChange: function(e) { setUserFormData(Object.assign({}, userFormData, { role: e.target.value.toUpperCase() })); }, required: true }),
                              React.createElement(UI.Input, { label: 'Líder/Setor', name: 'leader', value: userFormData.leader, onChange: function(e) { setUserFormData(Object.assign({}, userFormData, { leader: e.target.value.toUpperCase() })); } })
                          ),
                          React.createElement('div', { className: 'mb-8' },
                              React.createElement('span', { className: 'nx-text-label block mb-2' }, "Permissões de Acesso"),
                              React.createElement('div', { className: 'grid grid-cols-2 gap-2 text-xs' },
                                  permissionsList.map(function(perm) {
                                      return React.createElement('label', { key: perm.id, className: 'flex items-center gap-2 cursor-pointer hover:text-blue-500' },
                                          React.createElement('input', {
                                              type: 'checkbox',
                                              checked: (userFormData.permissions || []).includes(perm.id),
                                              onChange: function(e) {
                                                  var current = userFormData.permissions || [];
                                                  var next = e.target.checked ? current.concat([perm.id]) : current.filter(function(p) { return p !== perm.id; });
                                                  setUserFormData(Object.assign({}, userFormData, { permissions: next }));
                                              }
                                          }),
                                          perm.label
                                      );
                                  })
                              )
                          ),
                          React.createElement('div', { className: 'flex gap-4' },
                              React.createElement('button', { type: 'button', onClick: function() { setUserFormData({id:'',name:'',matricula:'',leader:'',role:'',permissions:[]}); setIsUserEditing(false); }, className: 'btn-action-cancel flex-1' }, "Limpar"),
                              React.createElement('button', { type: 'submit', className: 'btn-action-confirm flex-[2]' }, "Salvar")
                          )
                      )
                  )
              ),
              
              // LISTA
