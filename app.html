<script>
/**
 * SYSGESTAO v2.0 - Frontend Logic
 * Arquivo: app.html
 */

// --- ESTADO GLOBAL DA APLICAÇÃO ---
const AppState = {
  user: null,
  currentView: 'dashboard',
  data: {
    leitos: [],
    pacientes: [],
    logs: []
  },
  theme: 'light'
};

// --- INICIALIZAÇÃO ---
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  updateDateDisplay();
  // Verifica se há sessão salva (opcional, por enquanto foca no login)
});

function initTheme() {
  const savedTheme = localStorage.getItem('sysgestao_theme') || 'light';
  AppState.theme = savedTheme;
  applyTheme(savedTheme);
}

function toggleTheme() {
  const newTheme = AppState.theme === 'light' ? 'dark' : 'light';
  AppState.theme = newTheme;
  localStorage.setItem('sysgestao_theme', newTheme);
  applyTheme(newTheme);
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('theme-icon');
  if (icon) {
    icon.textContent = theme === 'light' ? 'dark_mode' : 'light_mode';
  }
}

function updateDateDisplay() {
  const dateEl = document.getElementById('current-date');
  if (dateEl) {
    const now = new Date();
    dateEl.textContent = now.toLocaleDateString('pt-BR', { 
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' 
    });
  }
}

// --- AUTENTICAÇÃO ---

function handleLogin(e) {
  e.preventDefault();
  const matricula = document.getElementById('matricula').value;
  const senha = document.getElementById('senha').value;
  const btn = document.getElementById('btn-login');
  const errorMsg = document.getElementById('login-error');
  
  // UI Loading
  btn.disabled = true;
  btn.querySelector('.btn-text').textContent = 'Entrando...';
  btn.querySelector('.loader').classList.remove('hidden');
  errorMsg.classList.add('hidden');

  // Chamada ao Backend
  google.script.run
    .withSuccessHandler(onLoginSuccess)
    .withFailureHandler(onLoginFailure)
    .login(matricula, senha);
}

function onLoginSuccess(response) {
  const btn = document.getElementById('btn-login');
  btn.disabled = false;
  btn.querySelector('.btn-text').textContent = 'Entrar no Sistema';
  btn.querySelector('.loader').classList.add('hidden');

  if (response.success) {
    AppState.user = response.user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    
    // Setup User Info
    document.getElementById('user-name-display').textContent = response.user.nome;
    document.getElementById('user-role-display').textContent = response.user.perfil;
    document.getElementById('user-avatar').textContent = response.user.nome.charAt(0).toUpperCase();
    
    // Carregar Dados Iniciais
    loadInitialData();
    navigate('dashboard');
    showToast(`Bem-vindo, ${response.user.nome}!`, 'success');
  } else {
    const errorMsg = document.getElementById('login-error');
    errorMsg.textContent = response.message;
    errorMsg.classList.remove('hidden');
  }
}

function onLoginFailure(error) {
  const btn = document.getElementById('btn-login');
  btn.disabled = false;
  btn.querySelector('.btn-text').textContent = 'Entrar no Sistema';
  btn.querySelector('.loader').classList.add('hidden');
  
  const errorMsg = document.getElementById('login-error');
  errorMsg.textContent = 'Erro de conexão: ' + error.message;
  errorMsg.classList.remove('hidden');
}

function logout() {
  if(confirm('Deseja realmente sair do sistema?')) {
    AppState.user = null;
    document.getElementById('app-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-form').reset();
    navigate('dashboard'); // Reset view
  }
}

// --- NAVEGAÇÃO E ROTEAMENTO ---

function navigate(viewName) {
  AppState.currentView = viewName;
  
  // Atualizar Menu
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
    if (item.getAttribute('onclick').includes(viewName)) {
      item.classList.add('active');
    }
  });

  // Esconder todas as views
  document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
  
  // Mostrar view selecionada
  const target = document.getElementById(`view-${viewName}`);
  if (target) {
    target.classList.remove('hidden');
    document.getElementById('page-title').textContent = getPageTitle(viewName);
    
    // Carregar dados específicos se necessário
    if (viewName === 'leitos') renderLeitos();
    if (viewName === 'pacientes') renderPacientes();
    if (viewName === 'dashboard') renderDashboard();
  }
}

function getPageTitle(view) {
  const titles = {
    'dashboard': 'Visão Geral',
    'leitos': 'Mapa de Leitos',
    'pacientes': 'Gestão de Pacientes',
    'transferencias': 'Transferências',
    'pa': 'Pronto Atendimento',
    'altas': 'Altas e Óbitos',
    'equipes': 'Equipes',
    'config': 'Configurações'
  };
  return titles[view] || 'Sistema';
}

// --- CARREGAMENTO DE DADOS ---

function loadInitialData() {
  showLoading(true);
  // Carrega tudo em paralelo ou sequencial conforme necessidade
  refreshData();
}

function refreshData() {
  // Busca Leitos e Pacientes
  google.script.run
    .withSuccessHandler(data => {
      AppState.data.leitos = data;
      if (AppState.currentView === 'leitos' || AppState.currentView === 'dashboard') {
        renderLeitos(); // Re-renderiza se estiver na tela
        if(AppState.currentView === 'dashboard') renderDashboard();
      }
      populateLeitoSelect(); // Atualiza selects de leitos
      showLoading(false);
    })
    .withFailureHandler(err => {
      showToast('Erro ao carregar leitos: ' + err.message, 'error');
      showLoading(false);
    })
    .getMapaLeitos();

  google.script.run
    .withSuccessHandler(data => {
      AppState.data.pacientes = data;
      if (AppState.currentView === 'pacientes') renderPacientes();
    })
    .getDados('Pacientes');
    
  // Logs recentes para dashboard
  google.script.run
    .withSuccessHandler(data => {
      AppState.data.logs = data.slice(0, 5); // Pega apenas os 5 últimos
      if(AppState.currentView === 'dashboard') renderDashboard();
    })
    .getDados('Logs_Auditoria');
}

function showLoading(isLoading) {
  // Pode implementar um spinner global aqui se desejar
  const content = document.getElementById('content-area');
  if (isLoading) {
    content.style.opacity = '0.5';
  } else {
    content.style.opacity = '1';
  }
}

// --- RENDERIZAÇÃO DE COMPONENTES ---

function renderDashboard() {
  const leitos = AppState.data.leitos;
  const total = leitos.length;
  const ocupados = leitos.filter(l => l.Status === 'Ocupado').length;
  const livres = total - ocupados;
  
  // Simulação de fila PA (virá de outra função depois)
  const pa = 0; 

  document.getElementById('stat-total-leitos').textContent = total;
  document.getElementById('stat-ocupados').textContent = ocupados;
  document.getElementById('stat-livres').textContent = livres;
  document.getElementById('stat-pa').textContent = pa;

  // Tabela de Logs Recentes
  const tbody = document.getElementById('dashboard-recent-logs');
  if (!tbody) return;
  
  const logs = AppState.data.logs || [];
  if (logs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Nenhuma atividade recente</td></tr>';
    return;
  }

  tbody.innerHTML = logs.map(log => {
    const date = new Date(log.Timestamp);
    const timeStr = date.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
    return `
      <tr>
        <td>${timeStr}</td>
        <td>${log.Acao.includes('Paciente') ? 'Paciente' : 'Sistema'}</td>
        <td><span class="badge">${log.Acao}</span></td>
        <td>${log.Usuario}</td>
      </tr>
    `;
  }).join('');
}

function renderLeitos() {
  const grid = document.getElementById('leitos-grid');
  if (!grid) return;

  const leitos = AppState.data.leitos;
  if (leitos.length === 0) {
    grid.innerHTML = '<p class="text-center" style="grid-column: 1/-1;">Nenhum leito cadastrado. Vá em Configurações ou use o botão "Novo Leito".</p>';
    return;
  }

  grid.innerHTML = leitos.map(leito => {
    const isOcupado = leito.Status === 'Ocupado';
    const paciente = leito.pacienteInfo;
    
    return `
      <div class="card-leito ${isOcupado ? 'ocupado' : 'livre'}" onclick="openLeitoDetails('${leito._id}')">
        <div class="leito-status ${isOcupado ? 'status-ocupado' : 'status-livre'}">
          ${isOcupado ? 'OCUPADO' : 'LIVRE'}
        </div>
        <h4 style="margin-bottom:0.5rem; font-size:1.1rem;">${leito.Nome}</h4>
        <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:0.25rem;">${leito.Setor} - ${leito.Tipo}</p>
        
        ${isOcupado && paciente ? `
          <div style="margin-top:1rem; padding-top:0.5rem; border-top:1px solid var(--border-color);">
            <p style="font-weight:600; font-size:0.9rem;">${paciente.Nome}</p>
            <p style="font-size:0.8rem; color:var(--text-muted);">Entrada: ${formatDate(paciente.DataEntrada)}</p>
          </div>
        ` : `
          <div style="margin-top:1rem; height:40px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:0.8rem;">
            Disponível
          </div>
        `}
      </div>
    `;
  }).join('');
}

function renderPacientes() {
  const tbody = document.getElementById('tabela-pacientes');
  if (!tbody) return;

  const pacientes = AppState.data.pacientes;
  if (pacientes.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nenhum paciente registrado.</td></tr>';
    return;
  }

  tbody.innerHTML = pacientes.map(p => {
    const leitoInfo = p.LeitoID ? AppState.data.leitos.find(l => l._id === p.LeitoID) : null;
    const leitoStr = leitoInfo ? `${leitoInfo.Nome} (${leitoInfo.Setor})` : 'Sem Leito';
    
    return `
      <tr>
        <td><strong>${p.Nome}</strong></td>
        <td>${calculateAge(p.DataNascimento)} / ${p.Genero}</td>
        <td>${p.Convenio || '-'}</td>
        <td>${leitoStr}</td>
        <td><span class="badge ${p.Status === 'Internado' ? 'bg-green' : 'bg-gray'}">${p.Status}</span></td>
        <td>
          <button class="btn-icon" title="Editar" onclick="editPaciente('${p._id}')"><span class="material-icons-round">edit</span></button>
          ${p.Status === 'Internado' ? `<button class="btn-icon text-red" title="Dar Alta" onclick="confirmAlta('${p._id}')"><span class="material-icons-round">assignment_turned_in</span></button>` : ''}
        </td>
      </tr>
    `;
  }).join('');
}

function populateLeitoSelect() {
  const select = document.getElementById('paciente-leito');
  if (!select) return;
  
  const livres = AppState.data.leitos.filter(l => l.Status === 'Livre');
  
  let options = '<option value="">Selecione um leito livre...</option>';
  livres.forEach(l => {
    options += `<option value="${l._id}">${l.Nome} - ${l.Setor}</option>`;
  });
  
  select.innerHTML = options;
}

// --- AÇÕES E MODAIS ---

function openModal(modalId) {
  document.getElementById('modal-backdrop').classList.remove('hidden');
  document.getElementById(modalId).classList.remove('hidden');
  
  // Se for modal de paciente, atualiza a lista de leitos
  if (modalId === 'modal-paciente') {
    populateLeitoSelect();
    document.getElementById('form-paciente').reset();
    document.getElementById('paciente-nasc').valueAsDate = new Date(); // Default hoje não, mas pode ser útil
  }
  if (modalId === 'modal-leito') {
    document.getElementById('form-leito').reset();
    document.getElementById('leito-id').value = ''; // Modo criação
  }
}

function closeAllModals() {
  document.getElementById('modal-backdrop').classList.add('hidden');
  document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
}

function saveLeito(e) {
  e.preventDefault();
  const id = document.getElementById('leito-id').value;
  const nome = document.getElementById('leito-nome').value;
  const setor = document.getElementById('leito-setor').value;
  const tipo = document.getElementById('leito-tipo').value;

  const dados = {
    _id: id || '',
    Nome: nome,
    Setor: setor,
    Tipo: tipo,
    Status: id ? undefined : 'Livre' // Só define status se for novo
  };

  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast(res.message, 'success');
        closeAllModals();
        refreshData();
      } else {
        showToast(res.message, 'error');
      }
    })
    .salvarDados('Leitos', dados);
}

function savePaciente(e) {
  e.preventDefault();
  const nome = document.getElementById('paciente-nome').value;
  const nasc = document.getElementById('paciente-nasc').value;
  const genero = document.getElementById('paciente-genero').value;
  const convenio = document.getElementById('paciente-convenio').value;
  const leitoId = document.getElementById('paciente-leito').value;

  if (!leitoId) {
    showToast('Selecione um leito para o paciente.', 'error');
    return;
  }

  const dados = {
    _id: '',
    Nome: nome,
    DataNascimento: nasc,
    Genero: genero,
    Convenio: convenio,
    LeitoID: leitoId,
    DataEntrada: new Date(),
    Status: 'Internado'
  };

  // Primeiro salva o paciente
  google.script.run
    .withSuccessHandler(resPac => {
      if (!resPac.success) {
        showToast(resPac.message, 'error');
        return;
      }
      
      // Depois ocupa o leito
      const leito = AppState.data.leitos.find(l => l._id === leitoId);
      leito.PacienteID = resPac.id; // ID retornado do backend
      leito.Status = 'Ocupado';
      leito.UltimaAtualizacao = new Date();
      
      google.script.run
        .withSuccessHandler(resLeito => {
          if (resLeito.success) {
            showToast('Paciente admitido com sucesso!', 'success');
            closeAllModals();
            refreshData();
            navigate('leitos'); // Vai para o mapa de leitos
          } else {
            showToast('Erro ao ocupar leito: ' + resLeito.message, 'error');
          }
        })
        .salvarDados('Leitos', leito);
        
    })
    .salvarDados('Pacientes', dados);
}

function confirmAlta(pacienteId) {
  if(confirm('Tem certeza que deseja dar ALTA neste paciente? O leito será liberado.')) {
    const obs = prompt('Motivo da alta (opcional):', 'Alta médica padrão');
    
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          showToast('Alta realizada com sucesso!', 'success');
          refreshData();
        } else {
          showToast(res.message, 'error');
        }
      })
      .darAlta(pacienteId, obs || '');
  }
}

// --- UTILITÁRIOS ---

function showToast(message, type = 'info') {
  const toast = document.getElementById('toast');
  const msgEl = document.getElementById('toast-message');
  const iconEl = document.getElementById('toast-icon');
  
  msgEl.textContent = message;
  toast.className = `toast ${type}`; // reset classes
  
  let icon = 'info';
  if (type === 'success') icon = 'check_circle';
  if (type === 'error') icon = 'error';
  iconEl.textContent = icon;
  
  toast.classList.remove('hidden');
  
  setTimeout(() => {
    toast.classList.add('hidden');
  }, 3000);
}

function formatDate(dateString) {
  if (!dateString) return '-';
  const d = new Date(dateString);
  return d.toLocaleDateString('pt-BR');
}

function calculateAge(birthDateString) {
  if (!birthDateString) return '?';
  const birthDate = new Date(birthDateString);
  const today = new Date();
  let age = today.getFullYear() - birthDate.getFullYear();
  const m = today.getMonth() - birthDate.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
    age--;
  }
  return age;
}

function filterLeitos(query) {
  const cards = document.querySelectorAll('.card-leito');
  const term = query.toLowerCase();
  
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    if (text.includes(term)) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
}

function openLeitoDetails(leitoId) {
  const leito = AppState.data.leitos.find(l => l._id === leitoId);
  if (!leito) return;
  
  if (leito.Status === 'Ocupado' && leito.pacienteInfo) {
    const p = leito.pacienteInfo;
    alert(`PACIENTE: ${p.Nome}\nIDADE: ${calculateAge(p.DataNascimento)}\nCONVÊNIO: ${p.Convenio}\nENTRADA: ${formatDate(p.DataEntrada)}\n\nAções disponíveis: Transferência, Alta.`);
    // Aqui poderia abrir um modal detalhado com botões de ação
  } else {
    // Opção de editar leito ou atribuir paciente manualmente se quiser expandir
    if(confirm(`Leito ${leito.Nome} está livre.\nDeseja editar as configurações do leito?`)) {
       // Lógica para editar leito existente (preencher modal)
       document.getElementById('leito-id').value = leito._id;
       document.getElementById('leito-nome').value = leito.Nome;
       document.getElementById('leito-setor').value = leito.Setor;
       document.getElementById('leito-tipo').value = leito.Tipo;
       openModal('modal-leito');
    }
  }
}

function editPaciente(id) {
  alert('Funcionalidade de edição de paciente em desenvolvimento. Use a tela de admissão para novos.');
}

</script>
