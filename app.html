<script>
/**
 * SYSGESTAO v2.0 - Frontend JavaScript
 * Lógica da Aplicação
 */

// --- ESTADO GLOBAL ---
let currentUser = null;
let allData = {
  leitos: [],
  pacientes: [],
  movimentacoes: [],
  setores: []
};

// --- INICIALIZAÇÃO ---
document.addEventListener('DOMContentLoaded', () => {
  console.log('SYSGESTAO v2.0 Iniciado');
  updateDateDisplay();
  
  // Verifica se há sessão salva (opcional, simples)
  const savedUser = localStorage.getItem('sysgestao_user');
  if (savedUser) {
    currentUser = JSON.parse(savedUser);
    showAppScreen();
  }
});

function updateDateDisplay() {
  const now = new Date();
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('current-date').textContent = now.toLocaleDateString('pt-BR', options);
}

// --- AUTENTICAÇÃO ---
function handleLogin(event) {
  event.preventDefault();
  
  const matricula = document.getElementById('matricula').value;
  const senha = document.getElementById('senha').value;
  const btn = document.getElementById('btn-login');
  const errorMsg = document.getElementById('login-error');
  
  // UI Loading
  btn.querySelector('.btn-text').classList.add('hidden');
  btn.querySelector('.loader').classList.remove('hidden');
  errorMsg.classList.add('hidden');
  
  // Chamada ao Backend
  google.script.run
    .withSuccessHandler(onLoginSuccess)
    .withFailureHandler(onLoginFailure)
    .login(matricula, senha);
}

function onLoginSuccess(response) {
  const btn = document.getElementById('btn-login');
  const errorMsg = document.getElementById('login-error');
  
  // Reset UI Button
  btn.querySelector('.btn-text').classList.remove('hidden');
  btn.querySelector('.loader').classList.add('hidden');
  
  if (response.success) {
    currentUser = response.user;
    localStorage.setItem('sysgestao_user', JSON.stringify(currentUser));
    showAppScreen();
    loadInitialData();
    showToast(`Bem-vindo, ${currentUser.nome}!`, 'success');
  } else {
    errorMsg.textContent = response.message;
    errorMsg.classList.remove('hidden');
  }
}

function onLoginFailure(error) {
  const btn = document.getElementById('btn-login');
  const errorMsg = document.getElementById('login-error');
  
  btn.querySelector('.btn-text').classList.remove('hidden');
  btn.querySelector('.loader').classList.add('hidden');
  
  errorMsg.textContent = 'Erro de conexão: ' + error;
  errorMsg.classList.remove('hidden');
}

function logout() {
  currentUser = null;
  localStorage.removeItem('sysgestao_user');
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-form').reset();
}

// --- NAVEGAÇÃO E UI ---
function showAppScreen() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  
  // Atualiza info do usuário na sidebar
  document.getElementById('user-name-display').textContent = currentUser.nome;
  document.getElementById('user-role-display').textContent = currentUser.perfil;
  document.getElementById('user-avatar').textContent = currentUser.nome.charAt(0).toUpperCase();
  
  // Carrega dados iniciais e vai para dashboard
  navigate('dashboard');
}

function navigate(viewName) {
  // Atualiza Menu Ativo
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
    if (item.getAttribute('onclick').includes(viewName)) {
      item.classList.add('active');
    }
  });
  
  // Esconde todas as views
  document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
  
  // Mostra a view selecionada
  const target = document.getElementById(`view-${viewName}`);
  if (target) {
    target.classList.remove('hidden');
    document.getElementById('page-title').textContent = getViewTitle(viewName);
    
    // Carrega dados específicos se necessário
    if (viewName === 'dashboard') renderDashboard();
    if (viewName === 'leitos') renderLeitos();
    if (viewName === 'pacientes') renderPacientes();
  }
}

function getViewTitle(name) {
  const titles = {
    'dashboard': 'Visão Geral',
    'leitos': 'Mapa de Leitos',
    'pacientes': 'Pacientes Internados',
    'transferencias': 'Transferências',
    'pa': 'Pronto Atendimento',
    'altas': 'Altas e Óbitos',
    'equipes': 'Equipes',
    'config': 'Configurações'
  };
  return titles[name] || 'Sistema';
}

function toggleTheme() {
  const body = document.body;
  const icon = document.getElementById('theme-icon');
  
  if (body.getAttribute('data-theme') === 'dark') {
    body.removeAttribute('data-theme');
    icon.textContent = 'dark_mode';
    localStorage.setItem('sysgestao_theme', 'light');
  } else {
    body.setAttribute('data-theme', 'dark');
    icon.textContent = 'light_mode';
    localStorage.setItem('sysgestao_theme', 'dark');
  }
}

// Carrega tema salvo
const savedTheme = localStorage.getItem('sysgestao_theme');
if (savedTheme === 'dark') {
  document.body.setAttribute('data-theme', 'dark');
  document.getElementById('theme-icon').textContent = 'light_mode';
}

// --- CARREGAMENTO DE DADOS ---
function loadInitialData() {
  // Busca todos os dados necessários do backend
  google.script.run
    .withSuccessHandler(data => {
      allData.leitos = data.leitos || [];
      allData.pacientes = data.pacientes || [];
      allData.movimentacoes = data.movimentacoes || [];
      renderDashboard();
    })
    .withFailureHandler(err => showToast('Erro ao carregar dados: ' + err, 'error'))
    .getAllData(); // Função auxiliar que precisaremos criar no Code.gs
}

// Se não tiver getAllData, fazemos chamadas separadas:
function loadInitialDataSeparate() {
  Promise.all([
    new Promise(resolve => google.script.run.withSuccessHandler(resolve).getDados('Leitos')),
    new Promise(resolve => google.script.run.withSuccessHandler(resolve).getDados('Pacientes')),
    new Promise(resolve => google.script.run.withSuccessHandler(resolve).getDados('Movimentacao'))
  ]).then(([leitos, pacientes, movs]) => {
    allData.leitos = leitos;
    allData.pacientes = pacientes;
    allData.movimentacoes = movs;
    renderDashboard();
  });
}

// --- RENDERIZAÇÃO DASHBOARD ---
function renderDashboard() {
  const total = allData.leitos.length;
  const ocupados = allData.leitos.filter(l => l.Status === 'Ocupado').length;
  const livres = total - ocupados;
  const paCount = allData.pacientes.filter(p => p.Status === 'PA').length;
  
  document.getElementById('stat-total-leitos').textContent = total;
  document.getElementById('stat-ocupados').textContent = ocupados;
  document.getElementById('stat-livres').textContent = livres;
  document.getElementById('stat-pa').textContent = paCount;
  
  // Tabela de atividades recentes (últimas 5 movimentações)
  const tbody = document.getElementById('dashboard-recent-logs');
  tbody.innerHTML = '';
  
  const recent = allData.movimentacoes.slice(-5).reverse();
  if (recent.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Nenhuma atividade recente</td></tr>';
    return;
  }
  
  recent.forEach(mov => {
    const tr = document.createElement('tr');
    const date = new Date(mov.DataHora);
    tr.innerHTML = `
      <td>${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
      <td>${mov.PacienteID || 'N/A'}</td>
      <td><span class="status-badge">${mov.Tipo}</span></td>
      <td>${mov.Usuario}</td>
    `;
    tbody.appendChild(tr);
  });
}

// --- RENDERIZAÇÃO LEITOS ---
function renderLeitos() {
  const grid = document.getElementById('leitos-grid');
  grid.innerHTML = '';
  
  if (allData.leitos.length === 0) {
    grid.innerHTML = '<p class="text-center" style="grid-column: 1/-1;">Nenhum leito cadastrado.</p>';
    return;
  }
  
  allData.leitos.forEach(leito => {
    const isOcupado = leito.Status === 'Ocupado';
    const paciente = allData.pacientes.find(p => String(p._id) === String(leito.PacienteID));
    
    const card = document.createElement('div');
    card.className = `card-leito ${isOcupado ? 'ocupado' : 'livre'}`;
    card.innerHTML = `
      <div class="leito-status ${isOcupado ? 'status-ocupado' : 'status-livre'}">
        ${isOcupado ? 'Ocupado' : 'Livre'}
      </div>
      <h4 style="margin-bottom:0.5rem; font-size:1.1rem;">${leito.Nome}</h4>
      <p style="color:var(--text-muted); font-size:0.85rem;">${leito.Setor} - ${leito.Tipo}</p>
      
      ${isOcupado && paciente ? `
        <div style="margin-top:1rem; padding-top:0.5rem; border-top:1px solid var(--border-color);">
          <p style="font-weight:600;">${paciente.Nome}</p>
          <p style="font-size:0.8rem; color:var(--text-muted);">Entrada: ${new Date(paciente.DataEntrada).toLocaleDateString()}</p>
        </div>
      ` : '<p style="margin-top:1rem; color:var(--text-muted); font-style:italic;">Disponível</p>'}
      
      <div style="margin-top:1rem; display:flex; gap:0.5rem;">
        <button class="btn-icon" title="Detalhes" onclick="alert('Detalhes do leito ${leito.Nome}')">
          <span class="material-icons-round" style="font-size:1.2rem;">visibility</span>
        </button>
        ${!isOcupado ? `
        <button class="btn-icon" title="Editar" onclick="editLeito('${leito._id}')">
          <span class="material-icons-round" style="font-size:1.2rem;">edit</span>
        </button>
        ` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

// --- RENDERIZAÇÃO PACIENTES ---
function renderPacientes() {
  const tbody = document.getElementById('tabela-pacientes');
  tbody.innerHTML = '';
  
  const ativos = allData.pacientes.filter(p => p.Status !== 'ALTA' && p.Status !== 'OBITO');
  
  if (ativos.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nenhum paciente ativo.</td></tr>';
    return;
  }
  
  ativos.forEach(p => {
    const leito = allData.leitos.find(l => String(l.PacienteID) === String(p._id));
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${p.Nome}</strong></td>
      <td>${calcularIdade(p.DataNascimento)} / ${p.Genero}</td>
      <td>${p.Convenio || 'N/A'}</td>
      <td>${leito ? `${leito.Nome} (${leito.Setor})` : 'Sem leito'}</td>
      <td><span class="status-badge status-${p.Status === 'INTERNADO' ? 'livre' : 'ocupado'}">${p.Status}</span></td>
      <td>
        <button class="btn-icon" title="Prontuário" onclick="alert('Prontuário de ${p.Nome}')">
          <span class="material-icons-round" style="font-size:1.2rem;">description</span>
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function calcularIdade(dataNasc) {
  if (!dataNasc) return '?';
  const diff = Date.now() - new Date(dataNasc).getTime();
  const ageDt = new Date(diff);
  return Math.abs(ageDt.getUTCFullYear() - 1970);
}

// --- MODAIS E FORMULÁRIOS ---
function openModal(modalId) {
  document.getElementById('modal-backdrop').classList.remove('hidden');
  document.getElementById(modalId).classList.remove('hidden');
  
  if (modalId === 'modal-paciente') {
    populateLeitosSelect();
  }
}

function closeAllModals() {
  document.getElementById('modal-backdrop').classList.add('hidden');
  document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
}

function populateLeitosSelect() {
  const select = document.getElementById('paciente-leito');
  select.innerHTML = '<option value="">Selecione um leito livre...</option>';
  
  const livres = allData.leitos.filter(l => l.Status === 'Livre');
  livres.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l._id;
    opt.textContent = `${l.Nome} - ${l.Setor}`;
    select.appendChild(opt);
  });
}

function savePaciente(event) {
  event.preventDefault();
  
  const novoPaciente = {
    Nome: document.getElementById('paciente-nome').value,
    DataNascimento: document.getElementById('paciente-nasc').value,
    Genero: document.getElementById('paciente-genero').value,
    Convenio: document.getElementById('paciente-convenio').value,
    Status: 'INTERNADO',
    DataEntrada: new Date().toISOString(),
    _id: '' // Novo
  };
  
  const leitoId = document.getElementById('paciente-leito').value;
  
  if (!leitoId) {
    showToast('Selecione um leito!', 'error');
    return;
  }
  
  // Salva paciente
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        // Atualiza leito
        const leito = allData.leitos.find(l => l._id === leitoId);
        leito.Status = 'Ocupado';
        leito.PacienteID = res.id || novoPaciente.Nome; // Simplificação
        
        google.script.run
          .withSuccessHandler(() => {
            showToast('Paciente admitido com sucesso!', 'success');
            closeAllModals();
            loadInitialDataSeparate(); // Recarrega tudo
            document.getElementById('form-paciente').reset();
          })
          .salvarDados('Leitos', leito);
      } else {
        showToast('Erro: ' + res.message, 'error');
      }
    })
    .salvarDados('Pacientes', novoPaciente);
}

function saveLeito(event) {
  event.preventDefault();
  // Implementação similar a savePaciente
  showToast('Funcionalidade em desenvolvimento', 'info');
  closeAllModals();
}

function editLeito(id) {
  const leito = allData.leitos.find(l => l._id === id);
  if (!leito) return;
  
  document.getElementById('leito-id').value = leito._id;
  document.getElementById('leito-nome').value = leito.Nome;
  document.getElementById('leito-setor').value = leito.Setor;
  document.getElementById('leito-tipo').value = leito.Tipo;
  
  openModal('modal-leito');
}

// --- UTILITÁRIOS ---
function showToast(message, type = 'info') {
  const toast = document.getElementById('toast');
  const msgEl = document.getElementById('toast-message');
  const iconEl = document.getElementById('toast-icon');
  
  msgEl.textContent = message;
  iconEl.textContent = type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info';
  
  toast.className = `toast ${type}`;
  toast.classList.remove('hidden');
  
  setTimeout(() => {
    toast.classList.add('hidden');
  }, 3000);
}

function filterLeitos(query) {
  // Implementação simples de filtro
  const cards = document.querySelectorAll('.card-leito');
  const term = query.toLowerCase();
  
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(term) ? 'block' : 'none';
  });
}
</script>
