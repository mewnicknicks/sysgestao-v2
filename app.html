<script>
/**
 * SYSGESTAO v2.0 - Frontend Logic
 * JavaScript ES6+ Puro
 */

// --- ESTADO GLOBAL DA APLICAÇÃO ---
const AppState = {
  user: null,
  currentView: 'dashboard',
  data: {
    leitos: [],
    pacientes: [],
    setores: [],
    logs: []
  }
};

// --- INICIALIZAÇÃO ---
document.addEventListener('DOMContentLoaded', () => {
  updateDateDisplay();
  // Verifica se há sessão salva (opcional para futuro)
});

function updateDateDisplay() {
  const now = new Date();
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('current-date').textContent = now.toLocaleDateString('pt-BR', options);
}

// --- AUTENTICAÇÃO ---

function handleLogin(event) {
  event.preventDefault();
  
  const matricula = document.getElementById('matricula').value;
  const senha = document.getElementById('senha').value;
  const btn = document.getElementById('btn-login');
  const errorMsg = document.getElementById('login-error');
  
  // UI Loading
  btn.disabled = true;
  btn.querySelector('.btn-text').classList.add('hidden');
  btn.querySelector('.loader').classList.remove('hidden');
  errorMsg.classList.add('hidden');

  // Chamada ao Backend
  google.script.run
    .withSuccessHandler(onLoginSuccess)
    .withFailureHandler(onLoginFailure)
    .login(matricula, senha);
}

function onLoginSuccess(response) {
  const btn = document.getElementById('btn-login');
  const errorMsg = document.getElementById('login-error');
  
  // Reset UI Button
  btn.disabled = false;
  btn.querySelector('.btn-text').classList.remove('hidden');
  btn.querySelector('.loader').classList.add('hidden');

  if (response.success) {
    AppState.user = response.user;
    initializeApp();
  } else {
    errorMsg.textContent = response.message;
    errorMsg.classList.remove('hidden');
  }
}

function onLoginFailure(error) {
  const btn = document.getElementById('btn-login');
  const errorMsg = document.getElementById('login-error');
  btn.disabled = false;
  btn.querySelector('.btn-text').classList.remove('hidden');
  btn.querySelector('.loader').classList.add('hidden');
  errorMsg.textContent = 'Erro de conexão: ' + error;
  errorMsg.classList.remove('hidden');
}

function logout() {
  AppState.user = null;
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-form').reset();
  showToast('Sessão encerrada.', 'info');
}

// --- NAVEGAÇÃO E UI PRINCIPAL ---

function initializeApp() {
  // Troca de tela
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  
  // Atualiza info do usuário
  document.getElementById('user-name-display').textContent = AppState.user.nome;
  document.getElementById('user-role-display').textContent = AppState.user.perfil;
  document.getElementById('user-avatar').textContent = AppState.user.nome.charAt(0).toUpperCase();
  
  // Carrega dados iniciais
  loadAllData();
  
  // Navega para dashboard
  navigate('dashboard');
}

function navigate(viewName) {
  AppState.currentView = viewName;
  
  // Atualiza Menu Ativo
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
    if (item.getAttribute('onclick').includes(viewName)) {
      item.classList.add('active');
    }
  });
  
  // Esconde todas as views
  document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
  
  // Mostra a view selecionada
  const target = document.getElementById(`view-${viewName}`);
  if (target) {
    target.classList.remove('hidden');
    document.getElementById('page-title').textContent = getPageTitle(viewName);
    
    // Refresh específico se necessário
    if (viewName === 'leitos') renderLeitos();
    if (viewName === 'pacientes') renderPacientes();
    if (viewName === 'dashboard') renderDashboard();
  }
}

function getPageTitle(view) {
  const titles = {
    'dashboard': 'Visão Geral',
    'leitos': 'Mapa de Leitos',
    'pacientes': 'Gestão de Pacientes',
    'transferencias': 'Transferências',
    'pa': 'Pronto Atendimento',
    'altas': 'Altas e Óbitos',
    'equipes': 'Equipes',
    'config': 'Configurações'
  };
  return titles[view] || 'Sistema';
}

function toggleTheme() {
  const body = document.body;
  const icon = document.getElementById('theme-icon');
  
  if (body.getAttribute('data-theme') === 'dark') {
    body.removeAttribute('data-theme');
    icon.textContent = 'dark_mode';
    localStorage.setItem('theme', 'light');
  } else {
    body.setAttribute('data-theme', 'dark');
    icon.textContent = 'light_mode';
    localStorage.setItem('theme', 'dark');
  }
}

// --- CARREGAMENTO DE DADOS ---

function loadAllData() {
  showToast('Carregando dados...', 'info');
  
  google.script.run
    .withSuccessHandler(data => {
      AppState.data.leitos = data.leitos || [];
      AppState.data.pacientes = data.pacientes || [];
      AppState.data.logs = data.logs || [];
      renderDashboard(); // Atualiza inicial
    })
    .withFailureHandler(err => showToast('Erro ao carregar: ' + err, 'error'))
    .getAllData(); // Função auxiliar no backend para pegar tudo de uma vez (ver nota abaixo*)
}

// * Nota: Para otimizar, criei a função getAllData no Code.gs abaixo, 
// mas se preferir, pode chamar getDados separadamente para cada tabela.

// --- RENDERIZAÇÃO: DASHBOARD ---

function renderDashboard() {
  const leitos = AppState.data.leitos;
  const total = leitos.length;
  const ocupados = leitos.filter(l => l.Status === 'Ocupado').length;
  const livres = total - ocupados;
  
  // Simulação de fila PA (virá da tabela Movimentacao futuramente)
  const paCount = 0; 

  document.getElementById('stat-total-leitos').textContent = total;
  document.getElementById('stat-ocupados').textContent = ocupados;
  document.getElementById('stat-livres').textContent = livres;
  document.getElementById('stat-pa').textContent = paCount;
  
  // Tabela de Logs Recentes
  const tbody = document.getElementById('dashboard-recent-logs');
  tbody.innerHTML = '';
  
  const recentLogs = AppState.data.logs.slice(-5).reverse();
  if (recentLogs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Nenhuma atividade recente</td></tr>';
    return;
  }
  
  recentLogs.forEach(log => {
    const date = new Date(log.Timestamp);
    const timeStr = date.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
    const row = `
      <tr>
        <td>${timeStr}</td>
        <td>${log.Usuario || 'Sistema'}</td>
        <td><span class="badge">${log.Acao}</span></td>
        <td class="text-muted">${log.Detalhes ? log.Detalhes.substring(0, 30) + '...' : ''}</td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

// --- RENDERIZAÇÃO: LEITOS ---

function renderLeitos() {
  const container = document.getElementById('leitos-grid');
  container.innerHTML = '';
  
  const leitos = AppState.data.leitos;
  
  if (leitos.length === 0) {
    container.innerHTML = '<p class="text-center" style="grid-column: 1/-1">Nenhum leito cadastrado.</p>';
    return;
  }
  
  leitos.forEach(leito => {
    const isOcupado = leito.Status === 'Ocupado';
    const paciente = leito.pacienteInfo;
    
    const card = document.createElement('div');
    card.className = `card-leito ${isOcupado ? 'ocupado' : 'livre'}`;
    card.innerHTML = `
      <div class="leito-status ${isOcupado ? 'status-ocupado' : 'status-livre'}">
        ${isOcupado ? 'Ocupado' : 'Livre'}
      </div>
      <h4 style="margin-bottom: 0.5rem; font-size: 1.1rem;">${leito.Nome}</h4>
      <p class="text-muted" style="font-size: 0.85rem;">${leito.Setor} - ${leito.Tipo}</p>
      
      ${isOcupado && paciente ? `
        <div style="margin-top: 1rem; padding-top: 0.5rem; border-top: 1px solid var(--border-color);">
          <p style="font-weight: 600;">${paciente.Nome}</p>
          <p style="font-size: 0.8rem; color: var(--text-muted);">Entrada: ${formatDate(paciente.DataEntrada)}</p>
          <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem;">
            <button class="btn-icon" title="Ver Detalhes" onclick="alert('Detalhes do paciente: ${paciente.Nome}')"><span class="material-icons-round" style="font-size:1.2rem">visibility</span></button>
            <button class="btn-icon" title="Transferir" onclick="iniciarTransferencia('${leito._id}', '${paciente._id}')"><span class="material-icons-round" style="font-size:1.2rem">swap_horiz</span></button>
          </div>
        </div>
      ` : '<p style="margin-top:1rem; font-style:italic; font-size:0.85rem; color:var(--success)">Disponível</p>'}
    `;
    container.appendChild(card);
  });
}

// --- RENDERIZAÇÃO: PACIENTES ---

function renderPacientes() {
  const tbody = document.getElementById('tabela-pacientes');
  tbody.innerHTML = '';
  
  const pacientes = AppState.data.pacientes.filter(p => p.Status !== 'ALTA'); // Mostra apenas ativos
  
  if (pacientes.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nenhum paciente ativo.</td></tr>';
    return;
  }
  
  pacientes.forEach(p => {
    const leitoInfo = getLeitoNomeById(p.LeitoID);
    const row = `
      <tr>
        <td><strong>${p.Nome}</strong></td>
        <td>${calcularIdade(p.DataNascimento)} / ${p.Genero}</td>
        <td>${p.Convenio || '-'}</td>
        <td>${leitoInfo}</td>
        <td><span class="badge ${p.Status === 'Internado' ? 'bg-success' : 'bg-warning'}">${p.Status}</span></td>
        <td>
          <button class="btn-icon" title="Dar Alta" onclick="confirmarAlta('${p._id}', '${p.Nome}')"><span class="material-icons-round">assignment_turned_in</span></button>
        </td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
  
  // Atualiza select de leitos no modal de admissão
  atualizarSelectLeitosModal();
}

// --- LÓGICA DE MODAIS E FORMULÁRIOS ---

function openModal(modalId) {
  document.getElementById('modal-backdrop').classList.remove('hidden');
  document.getElementById(modalId).classList.remove('hidden');
  
  // Se for modal de leito, limpa form
  if (modalId === 'modal-leito') {
    document.getElementById('form-leito').reset();
    document.getElementById('leito-id').value = '';
  }
}

function closeAllModals() {
  document.getElementById('modal-backdrop').classList.add('hidden');
  document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
}

function saveLeito(event) {
  event.preventDefault();
  
  const id = document.getElementById('leito-id').value;
  const dados = {
    _id: id || '',
    Nome: document.getElementById('leito-nome').value,
    Setor: document.getElementById('leito-setor').value,
    Tipo: document.getElementById('leito-tipo').value,
    Status: id ? undefined : 'Livre' // Mantém status se editar
  };
  
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast(res.message, 'success');
        closeAllModals();
        loadAllData(); // Recarrega tudo
      } else {
        showToast(res.message, 'error');
      }
    })
    .salvarDados('Leitos', dados);
}

function savePaciente(event) {
  event.preventDefault();
  
  const dados = {
    _id: '',
    Nome: document.getElementById('paciente-nome').value,
    DataNascimento: document.getElementById('paciente-nasc').value,
    Genero: document.getElementById('paciente-genero').value,
    Convenio: document.getElementById('paciente-convenio').value,
    LeitoID: document.getElementById('paciente-leito').value,
    DataEntrada: new Date(),
    Status: 'Internado'
  };
  
  // Validação simples
  if (!dados.LeitoID) {
    showToast('Selecione um leito!', 'error');
    return;
  }
  
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        showToast('Paciente admitido com sucesso!', 'success');
        closeAllModals();
        loadAllData();
        navigate('leitos'); // Vai para mapa de leitos
      } else {
        showToast(res.message, 'error');
      }
    })
    .salvarDados('Pacientes', dados);
}

// --- FUNÇÕES AUXILIARES DE NEGÓCIO ---

function iniciarTransferencia(leitoOrigemId, pacienteId) {
  // Simplificação: Apenas alerta por enquanto. 
  // Em v2.0 completa, abriria modal de seleção de leito destino.
  const leitosLivres = AppState.data.leitos.filter(l => l.Status === 'Livre');
  if (leitosLivres.length === 0) {
    showToast('Não há leitos livres para transferência!', 'error');
    return;
  }
  
  const destinoId = prompt(`Leitos livres disponíveis:\n${leitosLivres.map(l=>l.Nome).join(', ')}\n\nDigite o NOME do leito de destino:`);
  if (!destinoId) return;
  
  const leitoDestino = leitosLivres.find(l => l.Nome === destinoId);
  if (!leitoDestino) {
    showToast('Leito de destino não encontrado.', 'error');
    return;
  }
  
  if (confirm(`Confirmar transferência para ${leitoDestino.Nome}?`)) {
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          showToast('Transferência realizada!', 'success');
          loadAllData();
        } else {
          showToast(res.message, 'error');
        }
      })
      .realizarTransferencia({
        pacienteId: pacienteId,
        leitoOrigemId: leitoOrigemId,
        leitoDestinoId: leitoDestino._id,
        observacao: 'Transferência via sistema'
      });
  }
}

function confirmarAlta(pacienteId, nome) {
  if (confirm(`Deseja realmente dar ALTA ao paciente ${nome}?`)) {
    const obs = prompt('Motivo da alta (opcional):', 'Melhora clínica');
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          showToast('Alta registrada com sucesso!', 'success');
          loadAllData();
        } else {
          showToast(res.message, 'error');
        }
      })
      .darAlta(pacienteId, obs || '');
  }
}

function atualizarSelectLeitosModal() {
  const select = document.getElementById('paciente-leito');
  select.innerHTML = '<option value="">Selecione um leito livre...</option>';
  
  AppState.data.leitos
    .filter(l => l.Status === 'Livre')
    .forEach(l => {
      const opt = document.createElement('option');
      opt.value = l._id;
      opt.textContent = `${l.Nome} (${l.Setor})`;
      select.appendChild(opt);
    });
}

// --- UTILITÁRIOS GERAIS ---

function showToast(message, type = 'info') {
  const toast = document.getElementById('toast');
  const msgEl = document.getElementById('toast-message');
  const iconEl = document.getElementById('toast-icon');
  
  msgEl.textContent = message;
  toast.className = `toast ${type}`; // reset classes
  
  let icon = 'info';
  if (type === 'success') icon = 'check_circle';
  if (type === 'error') icon = 'error';
  iconEl.textContent = icon;
  
  toast.classList.remove('hidden');
  
  setTimeout(() => {
    toast.classList.add('hidden');
  }, 3000);
}

function formatDate(dateVal) {
  if (!dateVal) return '-';
  const d = new Date(dateVal);
  return d.toLocaleDateString('pt-BR');
}

function calcularIdade(dataNasc) {
  if (!dataNasc) return '?';
  const hoje = new Date();
  const nasc = new Date(dataNasc);
  let idade = hoje.getFullYear() - nasc.getFullYear();
  const m = hoje.getMonth() - nasc.getMonth();
  if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) {
    idade--;
  }
  return idade;
}

function getLeitoNomeById(id) {
  if (!id) return '-';
  const leito = AppState.data.leitos.find(l => String(l._id) === String(id));
  return leito ? `${leito.Nome} (${leito.Setor})` : 'Desconhecido';
}

function filterLeitos(query) {
  // Implementação simples de filtro visual
  const cards = document.querySelectorAll('.card-leito');
  const term = query.toLowerCase();
  
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    if (text.includes(term)) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
}

</script>
