<!-- SYSGESTAO v2.0 - Estilos CSS Puros -->
<style>
/* =========================================
   1. VARIÁVEIS E TEMAS (CSS Variables)
   ========================================= */
:root {
  /* Cores Primárias */
  --primary: #2563eb;       /* Azul Hospitalar */
  --primary-hover: #1d4ed8;
  --secondary: #64748b;     /* Cinza Médio */
  
  /* Cores de Estado */
  --success: #10b981;       /* Verde */
  --warning: #f59e0b;       /* Laranja */
  --danger: #ef4444;        /* Vermelho */
  --info: #3b82f6;          /* Azul Info */
  
  /* Fundo e Texto (Tema Claro - Padrão) */
  --bg-body: #f1f5f9;
  --bg-card: #ffffff;
  --bg-input: #ffffff;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --border-color: #e2e8f0;
  
  /* Sombras e Bordas */
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --radius: 0.5rem;
  --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

/* Tema Escuro (Automático ou via classe .dark-mode) */
@media (prefers-color-scheme: dark) {
  :root {
    --bg-body: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #334155;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border-color: #334155;
  }
}

/* Forçar tema escuro se a classe existir no body */
body.dark-mode {
  --bg-body: #0f172a;
  --bg-card: #1e293b;
  --bg-input: #334155;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --border-color: #334155;
}

/* =========================================
   2. RESET E BASE
   ========================================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-family);
  background-color: var(--bg-body);
  color: var(--text-main);
  line-height: 1.6;
  transition: background-color 0.3s, color 0.3s;
  font-size: 16px;
}

h1, h2, h3, h4, h5, h6 {
  font-weight: 600;
  margin-bottom: 0.5em;
  color: var(--text-main);
}

p { margin-bottom: 1rem; }

a {
  color: var(--primary);
  text-decoration: none;
  cursor: pointer;
}
a:hover { text-decoration: underline; }

/* =========================================
   3. LAYOUT PRINCIPAL
   ========================================= */
.app-container {
  display: flex;
  min-height: 100vh;
}

/* Sidebar (Menu Lateral) */
.sidebar {
  width: 260px;
  background-color: var(--bg-card);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s ease;
}

.sidebar-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--border-color);
  text-align: center;
}

.sidebar-logo {
  font-size: 1.5rem;
  font-weight: bold;
  color: var(--primary);
  display: block;
}

.nav-menu {
  list-style: none;
  padding: 1rem 0;
  flex: 1;
}

.nav-item {
  margin-bottom: 0.25rem;
}

.nav-link {
  display: flex;
  align-items: center;
  padding: 0.75rem 1.5rem;
  color: var(--text-muted);
  font-weight: 500;
  transition: all 0.2s;
  cursor: pointer;
}

.nav-link:hover, .nav-link.active {
  background-color: rgba(37, 99, 235, 0.1); /* Primary com opacidade */
  color: var(--primary);
  border-right: 3px solid var(--primary);
  text-decoration: none;
}

.nav-icon {
  margin-right: 0.75rem;
  font-size: 1.2rem;
  width: 20px;
  text-align: center;
}

.sidebar-footer {
  padding: 1rem;
  border-top: 1px solid var(--border-color);
  font-size: 0.875rem;
  color: var(--text-muted);
  text-align: center;
}

/* Conteúdo Principal */
.main-content {
  flex: 1;
  margin-left: 260px; /* Largura da sidebar */
  padding: 2rem;
  width: calc(100% - 260px);
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  background: var(--bg-card);
  padding: 1rem;
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}

.user-info {
  display: flex;
  align-items: center;
  gap: 1rem;
}

/* Responsividade Mobile */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .main-content {
    margin-left: 0;
    width: 100%;
    padding: 1rem;
  }
  .mobile-menu-btn {
    display: block !important;
  }
}

.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  font-size: 1.5rem;
  color: var(--text-main);
  cursor: pointer;
  margin-right: 1rem;
}

/* =========================================
   4. COMPONENTES DE UI
   ========================================= */

/* Cards */
.card {
  background-color: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  border: 1px solid var(--border-color);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border-color);
}

.card-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin: 0;
}

/* Botões */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.625rem 1.25rem;
  font-size: 0.95rem;
  font-weight: 500;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  gap: 0.5rem;
}

.btn-primary {
  background-color: var(--primary);
  color: white;
}
.btn-primary:hover { background-color: var(--primary-hover); }

.btn-secondary {
  background-color: var(--bg-body);
  color: var(--text-main);
  border-color: var(--border-color);
}
.btn-secondary:hover { background-color: var(--border-color); }

.btn-success { background-color: var(--success); color: white; }
.btn-success:hover { filter: brightness(0.9); }

.btn-danger { background-color: var(--danger); color: white; }
.btn-danger:hover { filter: brightness(0.9); }

.btn-sm { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
.btn-block { width: 100%; }

/* Formulários */
.form-group { margin-bottom: 1rem; }

.form-label {
  display: block;
  margin-bottom: 0.5rem;
  font-weight: 500;
  color: var(--text-main);
}

.form-control {
  width: 100%;
  padding: 0.625rem;
  font-size: 1rem;
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  background-color: var(--bg-input);
  color: var(--text-main);
  transition: border-color 0.2s;
}

.form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

select.form-control { cursor: pointer; }

/* Tabelas */
.table-responsive {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border-color);
}

.table {
  width: 100%;
  border-collapse: collapse;
  background-color: var(--bg-card);
}

.table th, .table td {
  padding: 0.75rem 1rem;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}

.table th {
  background-color: rgba(0,0,0,0.02);
  font-weight: 600;
  color: var(--text-muted);
  font-size: 0.875rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.table tr:hover { background-color: rgba(0,0,0,0.01); }

/* Badges (Etiquetas de Status) */
.badge {
  display: inline-block;
  padding: 0.25rem 0.6rem;
  font-size: 0.75rem;
  font-weight: 600;
  border-radius: 9999px;
  text-transform: uppercase;
}

.bg-success-light { background-color: rgba(16, 185, 129, 0.1); color: var(--success); }
.bg-danger-light { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }
.bg-warning-light { background-color: rgba(245, 158, 11, 0.1); color: var(--warning); }
.bg-info-light { background-color: rgba(59, 130, 246, 0.1); color: var(--info); }

/* Grid System Simples */
.row { display: flex; flex-wrap: wrap; margin: 0 -0.5rem; }
.col { flex: 1; padding: 0 0.5rem; }
.col-6 { flex: 0 0 50%; max-width: 50%; padding: 0 0.5rem; }
.col-4 { flex: 0 0 33.33%; max-width: 33.33%; padding: 0 0.5rem; }
.col-3 { flex: 0 0 25%; max-width: 25%; padding: 0 0.5rem; }

@media (max-width: 768px) {
  .col-6, .col-4, .col-3 { flex: 0 0 100%; max-width: 100%; }
}

/* Utilitários */
.text-center { text-align: center; }
.text-right { text-align: right; }
.mt-4 { margin-top: 1.5rem; }
.mb-4 { margin-bottom: 1.5rem; }
.hidden { display: none !important; }

/* Loading Spinner */
.spinner {
  border: 4px solid rgba(0, 0, 0, 0.1);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border-left-color: var(--primary);
  animation: spin 1s linear infinite;
  margin: 2rem auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Login Screen Specifics */
.login-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background-color: var(--bg-body);
}
.login-card {
  width: 100%;
  max-width: 400px;
  padding: 2rem;
}

/* Mapa de Leitos (Grid Visual) */
.leito-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 1rem;
}

.leito-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 1rem;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

.leito-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.leito-card.ocupado { border-left: 4px solid var(--danger); }
.leito-card.livre { border-left: 4px solid var(--success); }
.leito-card.bloqueado { border-left: 4px solid var(--secondary); opacity: 0.7; }

.leito-status {
  font-size: 0.75rem;
  font-weight: bold;
  margin-top: 0.5rem;
  text-transform: uppercase;
}

</style>
