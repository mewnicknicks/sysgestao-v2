
<script>
  (function() {
    window.App = window.App || {};
    window.App.DischargeDeathComponents = {};

    var DischargeDeathStats = function(props) {
        var stats = props.stats;
        var UI = window.App.UI || {};
        return React.createElement('div', { className: 'nx-kpi-grid mb-8' },
            React.createElement(UI.KPICard, { label: "Movimentações Hoje", data: [{ value: stats.total, label: "Total" }], icon: "ph-activity", theme: "kpi-blue" }),
            React.createElement(UI.KPICard, { label: "Altas (Casa)", data: [{ value: stats.altaCasa, label: "Externas" }], icon: "ph-house-line", theme: "kpi-emerald" }),
            React.createElement(UI.KPICard, { label: "Altas U.I.", data: [{ value: stats.transf, label: "Internas" }], icon: "ph-arrows-left-right", theme: "kpi-cyan" }),
            React.createElement(UI.KPICard, { label: "Óbitos", data: [{ value: stats.obitos, label: "Registrados" }], icon: "ph-heart-break", theme: "kpi-rose" }),
            React.createElement(UI.KPICard, { label: "Pendências", data: [{ value: stats.pendentes, label: "Aguardando" }], icon: "ph-clock-countdown", theme: "kpi-amber", className: stats.pendentes > 0 ? 'animate-pulse border-amber-500' : '' })
        );
    };

    var DischargeDeathForm = function(props) {
        var formData = props.formData;
        var setFormData = props.setFormData;
        var handleAttendanceSearch = props.handleAttendanceSearch;
        var isPatientFound = props.isPatientFound;
        var isPendingEdit = props.isPendingEdit;
        var INSURANCE_OPTIONS = props.INSURANCE_OPTIONS;
        var REASON_OPTIONS = props.REASON_OPTIONS;
        var SPECIALTY_OPTIONS = props.SPECIALTY_OPTIONS;
        var SECTOR_MACRO_OPTIONS = props.SECTOR_MACRO_OPTIONS;
        var targetSector = props.targetSector;
        var setTargetSector = props.setTargetSector;
        var availableBedsOptions = props.availableBedsOptions;
        var RELEASED_OPTIONS = props.RELEASED_OPTIONS;
        var isSubmitting = props.isSubmitting;
        var submit = props.submit;
        var handleSubmit = props.handleSubmit;
        var getInitialFormState = props.getInitialFormState;
        var setIsPatientFound = props.setIsPatientFound;
        var setIsPendingEdit = props.setIsPendingEdit;
        var UI = window.App.UI || {};

        var altaUISection = formData.reason === 'ALTA_UI' && React.createElement('div', { className: 'mt-6 nx-form-section animate-fade-in' },
            React.createElement('div', { className: 'flex items-center gap-2 mb-4 nx-icon-primary' },
                React.createElement('i', { className: 'ph-fill ph-arrow-bend-down-right' }),
                React.createElement('span', { className: 'text-xs font-bold uppercase tracking-widest' }, 'Dados da Transferência Interna')
            ),
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6' },
                React.createElement(UI.Input, { label: 'Solicitante', value: formData.requester, onChange: function(e) { setFormData({...formData, requester: e.target.value.toUpperCase()}); }, required: formData.released === 'SIM' }),
                React.createElement(UI.Input, { label: 'Médico Receptor', value: formData.receiverDoctor, onChange: function(e) { setFormData({...formData, receiverDoctor: e.target.value.toUpperCase()}); }, icon: 'ph-stethoscope', required: formData.released === 'SIM' }),
                React.createElement(UI.SearchableSelect, { label: 'Especialidade', value: formData.specialty, onChange: function(e) { setFormData({...formData, specialty: e.target.value}); }, options: SPECIALTY_OPTIONS, required: formData.released === 'SIM' })
            ),
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6' },
                React.createElement(UI.SearchableSelect, { label: 'Setor Destino', value: targetSector, onChange: function(e) { setTargetSector(e.target.value); }, options: SECTOR_MACRO_OPTIONS, required: formData.released === 'SIM' }),
                React.createElement('div', { className: 'md:col-span-2' },
                    React.createElement(UI.SearchableSelect, { label: 'Leito Destino (Vago)', value: formData.destinationBed, onChange: function(e) { setFormData({...formData, destinationBed: e.target.value}); }, options: availableBedsOptions, disabled: !targetSector, required: formData.released === 'SIM' })
                )
            ),
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6' },
                React.createElement(UI.Input, { label: 'Comunicado Para?', value: formData.communicated, onChange: function(e) { setFormData({...formData, communicated: e.target.value.toUpperCase()}); }, required: formData.released === 'SIM' }),
                React.createElement(UI.SearchableSelect, { label: 'Liberado pela Gestão?', value: formData.released, onChange: function(e) { setFormData({...formData, released: e.target.value}); }, options: RELEASED_OPTIONS, required: true })
            )
        );

        return React.createElement(UI.Card, { className: 'p-8 sticky top-6' },
            React.createElement('div', { className: 'nx-settings-card-header' },
                React.createElement('i', { className: 'ph-bold ' + (isPendingEdit ? 'ph-pencil-simple text-amber-500' : 'ph-clipboard-text nx-icon-primary') + ' nx-settings-card-header-icon' }),
                React.createElement('h2', { className: 'nx-settings-card-header-title' }, isPendingEdit ? 'Editar Pendência' : 'Registrar Movimentação')
            ),
            React.createElement('form', { onSubmit: function(e) { e.preventDefault(); submit(handleSubmit); }, autoComplete: 'off' },
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6' },
                    React.createElement(UI.Input, { label: 'Nº Atendimento', name: 'attendance', value: formData.attendance, onChange: function(e) { handleAttendanceSearch(e.target.value); }, required: true, icon: 'ph-magnifying-glass' }),
                    React.createElement('div', { className: 'md:col-span-2' },
                        React.createElement(UI.Input, { label: 'Nome do Paciente', name: 'patientName', value: formData.patientName, onChange: function(e) { setFormData({...formData, patientName: e.target.value.toUpperCase()}); }, disabled: isPatientFound, required: true, icon: 'ph-user' })
                    )
                ),
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6' },
                    React.createElement(UI.SearchableSelect, { label: 'Convênio', name: 'insurance', value: formData.insurance, onChange: function(e) { setFormData({...formData, insurance: e.target.value}); }, options: INSURANCE_OPTIONS, disabled: isPatientFound, required: true }),
                    React.createElement(UI.Input, { label: 'Leito Origem', name: 'originBed', value: formData.originBed, onChange: function(e) { setFormData({...formData, originBed: e.target.value.toUpperCase()}); }, disabled: isPatientFound, required: true, icon: 'ph-bed' })
                ),
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6' },
                    React.createElement(UI.SearchableSelect, { label: 'Motivo da Saída', name: 'reason', value: formData.reason, onChange: function(e) { var val = e.target.value; setFormData({...formData, reason: val, released: (val === 'OBITO' || val === 'ALTA_CASA') ? 'SIM' : 'NAO'}); }, options: REASON_OPTIONS, required: true }),
                    React.createElement(UI.Input, { type: 'date', label: 'Data', name: 'date', value: formData.date, onChange: function(e) { setFormData({...formData, date: e.target.value}); }, required: true }),
                    React.createElement(UI.Input, { type: 'time', label: 'Hora', name: 'time', value: formData.time, onChange: function(e) { setFormData({...formData, time: e.target.value}); }, required: true })
                ),
                altaUISection,
                React.createElement('div', { className: 'flex gap-4 mt-8' },
                    React.createElement('button', { type: 'button', onClick: function() { setFormData(getInitialFormState()); setIsPatientFound(false); setTargetSector(''); setIsPendingEdit(false); }, className: 'btn-action-cancel flex-1' }, ' Limpar '),
                    React.createElement('button', { type: 'submit', disabled: isSubmitting, className: 'btn-action-confirm flex-[2] group ' + (isSubmitting ? 'opacity-60 pointer-events-none' : '') },
                        isSubmitting && React.createElement('i', { className: 'ph-bold ph-circle-notch animate-spin mr-2' }),
                        React.createElement('i', { className: 'ph-bold ' + (isPendingEdit ? 'ph-floppy-disk' : 'ph-check-circle') + ' mr-2 transition-transform group-hover:scale-110' }),
                        formData.released === 'NAO' ? 'SALVAR PENDÊNCIA' : (formData.reason === 'ALTA_UI' && formData.released !== 'SIM' ? 'SALVAR (AGUARDANDO)' : 'CONFIRMAR MOVIMENTAÇÃO')
                    )
                )
            )
        );
    };

    var DischargeDeathPendingList = function(props) {
        var incompleteRecords = props.incompleteRecords;
        var setFormData = props.setFormData;
        var setIsPatientFound = props.setIsPatientFound;
        var setIsPendingEdit = props.setIsPendingEdit;
        var UI = window.App.UI || {};
        var Utils = window.App.Utils || {};

        var cardsList = incompleteRecords.length > 0
            ? incompleteRecords.map(function(rec) {
                return React.createElement('div', {
                    key: rec.id,
                    onClick: function() { setFormData({...rec}); setIsPatientFound(true); setIsPendingEdit(true); window.scrollTo({top: 0, behavior: 'smooth'}); },
                    className: 'nx-waitlist-card group cursor-pointer'
                },
                    React.createElement('div', { className: 'absolute top-0 right-0 px-2 py-1 rounded-bl-lg text-[8px] font-black uppercase tracking-tighter bg-amber-600 text-black shadow-lg' }, rec.issue || "AGUARDANDO"),
                    React.createElement('div', { className: 'flex flex-col mb-3 pr-2' },
                        React.createElement('h4', { className: 'font-black text-xs uppercase leading-tight truncate nx-text-heading group-hover:text-cyan-400 transition-colors' }, rec.patientName),
                        React.createElement('span', { className: 'nx-text-label mt-1' }, rec.insurance)
                    ),
                    React.createElement('div', { className: 'mt-auto' },
                        React.createElement('div', { className: 'flex flex-wrap gap-2 mb-3' },
                            React.createElement('span', { className: 'text-[8px] font-black text-cyan-400 bg-cyan-950/30 px-2 py-0.5 rounded border border-cyan-500/20 uppercase tracking-widest' }, 'AT: ' + rec.attendance)
                        ),
                        React.createElement('div', { className: 'flex items-center justify-between pt-2 border-t border-[var(--nx-border)]' },
                            React.createElement('div', { className: 'flex items-center gap-2 text-[9px] font-black font-mono text-slate-500' },
                                React.createElement('i', { className: 'ph-bold ph-calendar-blank' }),
                                Utils.formatDateBr(rec.date)
                            )
                        )
                    )
                );
            })
            : React.createElement('div', { className: 'nx-waitlist-empty' },
                React.createElement('svg', { className: 'nx-waitlist-empty-icon', fill: 'none', viewBox: '0 0 24 24', stroke: 'currentColor', strokeWidth: '1' },
                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', d: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' })
                ),
                React.createElement('p', { className: 'nx-waitlist-empty-title' }, 'Tudo em dia'),
                React.createElement('p', { className: 'nx-waitlist-empty-text' }, 'Não há pendências de liberação no momento.')
            );

        return React.createElement(UI.Card, { className: 'p-0 flex flex-col h-full overflow-hidden min-h-[600px]' },
            React.createElement('div', { className: 'nx-settings-list-header' },
                React.createElement('h3', { className: 'nx-settings-list-title flex items-center gap-2' },
                    React.createElement('i', { className: 'ph-bold ph-clock-counter-clockwise text-amber-500' }),
                    ' Pendências de Liberação'
                )
            ),
            React.createElement('div', { className: 'p-4 flex-1 overflow-y-auto custom-scrollbar' },
                React.createElement('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-3' }, cardsList)
            )
        );
    };

    var DischargeDeathModals = function(props) {
        var showHistoryModal = props.showHistoryModal;
        var setShowHistoryModal = props.setShowHistoryModal;
        var historyFilters = props.historyFilters;
        var setHistoryFilters = props.setHistoryFilters;
        var INSURANCE_OPTIONS = props.INSURANCE_OPTIONS;
        var fetchHistory = props.fetchHistory;
        var isLoadingHistory = props.isLoadingHistory;
        var filteredModalData = props.filteredModalData;
        var UI = window.App.UI || {};
        var Utils = window.App.Utils || {};

        var tableContent = isLoadingHistory
            ? React.createElement('div', { className: 'flex h-full items-center justify-center text-cyan-500' },
                React.createElement('i', { className: 'ph-bold ph-circle-notch animate-spin text-4xl' })
            )
            : React.createElement('div', { className: 'nx-glass-table-wrapper rounded-none border-none shadow-none min-h-[300px]' },
                React.createElement('table', { className: 'nx-glass-table w-full' },
                    React.createElement('thead', { className: 'sticky top-0 z-10 shadow-md' },
                        React.createElement('tr', null,
                            React.createElement('th', { className: 'text-center py-3' }, 'Data/Hora'),
                            React.createElement('th', { className: 'text-center py-3' }, 'Tipo'),
                            React.createElement('th', { className: 'text-center py-3 pl-4 text-left' }, 'Paciente'),
                            React.createElement('th', { className: 'text-center py-3' }, 'Médico'),
                            React.createElement('th', { className: 'text-center py-3' }, 'Origem'),
                            React.createElement('th', { className: 'text-center py-3' }, 'Destino')
                        )
                    ),
                    React.createElement('tbody', null,
                        filteredModalData.map(function(h) {
                            return React.createElement('tr', { key: h.id, className: 'nx-glass-table-row' },
                                React.createElement('td', { className: 'text-center font-mono text-xs text-slate-500' }, Utils.formatDateBr(h.date) + ' ' + h.time),
                                React.createElement('td', { className: 'text-center' },
                                    React.createElement('span', { className: 'px-2 py-0.5 rounded text-[9px] font-black uppercase border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-900' }, h.reason)
                                ),
                                React.createElement('td', { className: 'font-bold text-slate-900 dark:text-white uppercase text-xs text-left pl-4' },
                                    h.patientName,
                                    React.createElement('div', { className: 'text-[9px] text-slate-500 font-normal' }, h.insurance)
                                ),
                                React.createElement('td', { className: 'text-center text-xs text-slate-400 font-bold uppercase' }, h.receiverDoctor || h.requester || '-'),
                                React.createElement('td', { className: 'text-center text-slate-400 font-bold text-xs' }, h.originBed),
                                React.createElement('td', { className: 'text-center text-cyan-400 font-bold text-xs' }, h.destinationBed || '-')
                            );
                        }),
                        filteredModalData.length === 0 && React.createElement('tr', null,
                            React.createElement('td', { colSpan: 6, className: 'p-8 text-center text-slate-500 text-xs italic' }, 'Nenhum registro encontrado neste período.')
                        )
                    )
                )
            );

        return React.createElement(UI.Modal, { isOpen: showHistoryModal, onClose: function() { setShowHistoryModal(false); }, size: 'large', title: 'Histórico Completo (Pesquisa no Servidor)' },
            React.createElement('div', { className: 'flex flex-col h-full max-h-[80vh]' },
                React.createElement('div', { className: 'px-6 py-4 nx-form-section rounded-none border-x-0 border-t-0 grid grid-cols-1 md:grid-cols-5 gap-4 items-end' },
                    React.createElement('div', null,
                        React.createElement('label', { className: 'nx-text-label' }, 'Início'),
                        React.createElement(UI.Input, { type: 'date', value: historyFilters.startDate, onChange: function(e) { setHistoryFilters({...historyFilters, startDate: e.target.value}); } })
                    ),
                    React.createElement('div', null,
                        React.createElement('label', { className: 'nx-text-label' }, 'Fim'),
                        React.createElement(UI.Input, { type: 'date', value: historyFilters.endDate, onChange: function(e) { setHistoryFilters({...historyFilters, endDate: e.target.value}); } })
                    ),
                    React.createElement('div', null,
                        React.createElement('label', { className: 'nx-text-label' }, 'Convênio'),
                        React.createElement(UI.SearchableSelect, { value: historyFilters.insurance, onChange: function(e) { setHistoryFilters({...historyFilters, insurance: e.target.value}); }, options: INSURANCE_OPTIONS })
                    ),
                    React.createElement('div', null,
                        React.createElement('label', { className: 'nx-text-label' }, 'Busca'),
                        React.createElement(UI.Input, { value: historyFilters.search, onChange: function(e) { setHistoryFilters({...historyFilters, search: e.target.value}); }, placeholder: 'Nome...' })
                    ),
                    React.createElement('button', { onClick: fetchHistory, className: 'h-[42px] mb-px bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg font-bold text-xs uppercase tracking-widest flex items-center justify-center gap-2' },
                        React.createElement('i', { className: 'ph-bold ph-magnifying-glass' }),
                        ' Filtrar'
                    )
                ),
                React.createElement('div', { className: 'flex-1 overflow-auto custom-scrollbar p-0 bg-slate-50 dark:bg-slate-900/30' },
                    tableContent
                )
            )
        );
    };

    window.App.DischargeDeathComponents = {
        DischargeDeathStats: DischargeDeathStats,
        DischargeDeathForm: DischargeDeathForm,
        DischargeDeathPendingList: DischargeDeathPendingList,
        DischargeDeathModals: DischargeDeathModals
    };
  })();
</script>
