
<script>
  (function() {
    window.App = window.App || {};

    var BedMapTooltip = function(props) {
      var hoveredBed = props.hoveredBed;
      var tooltipPos = props.tooltipPos;
      var getElapsedDuration = props.getElapsedDuration;
      var getStayDuration = props.getStayDuration;
      if (!hoveredBed) return null;

      return ReactDOM.createPortal(
        React.createElement('div', { className: 'fixed z-[9999] pointer-events-none', style: { top: tooltipPos.y, left: tooltipPos.x, transform: 'translate(-50%, -100%)', paddingBottom: '10px' } },
          React.createElement('div', { className: 'bg-white dark:bg-slate-900 border border-blue-100 dark:border-cyan-500/30 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] dark:shadow-2xl p-5 min-w-[280px] backdrop-blur-md' },

            React.createElement('div', { className: 'flex justify-between items-center mb-4 pb-3 border-b border-blue-50 dark:border-white/10' },
              React.createElement('span', { className: 'text-[10px] font-black uppercase tracking-widest ' + (
                hoveredBed.status === 'CLEANING' ? 'text-purple-600 dark:text-purple-400' :
                hoveredBed.status === 'OCCUPIED' ? 'text-blue-900 dark:text-white' :
                hoveredBed.status === 'MAINTENANCE' ? 'text-rose-600 dark:text-rose-500' :
                hoveredBed.status === 'RESERVED' ? 'text-amber-600 dark:text-amber-400' :
                'text-emerald-600 dark:text-emerald-400'
              ) },
                hoveredBed.status === 'MAINTENANCE' ? 'BLOQUEADO' :
                hoveredBed.status === 'RESERVED' ? 'RESERVADO' :
                hoveredBed.status === 'CLEANING' ? 'HIGIENIZAÇÃO' :
                hoveredBed.status === 'AVAILABLE' ? 'DISPONÍVEL' : 'OCUPADO'
              ),
              React.createElement('span', { className: 'text-lg font-black text-blue-900 dark:text-white bg-blue-50 dark:bg-slate-800 px-2 rounded-md border border-blue-200 dark:border-slate-700' }, hoveredBed.number)
            ),

            hoveredBed.status === 'AVAILABLE' && React.createElement('div', { className: 'mb-1' },
              React.createElement('span', { className: 'text-[8px] font-bold text-blue-400 dark:text-slate-500 uppercase tracking-widest block mb-1' }, 'Características'),
              hoveredBed.characteristics ? (
                React.createElement('div', { className: 'text-xs font-bold text-emerald-700 dark:text-emerald-300 italic bg-emerald-50 dark:bg-emerald-950/40 p-2 rounded-lg border border-emerald-100 dark:border-emerald-500/20 leading-relaxed' },
                  React.createElement('i', { className: 'ph-fill ph-info mr-1' }), ' ', hoveredBed.characteristics
                )
              ) : (
                React.createElement('span', { className: 'text-[10px] text-blue-300 dark:text-slate-400 italic' }, 'Padrão (Sem obs.)')
              )
            ),

            (hoveredBed.status === 'CLEANING' || hoveredBed.status === 'MAINTENANCE') && React.createElement('div', {
              className: (hoveredBed.status === 'CLEANING' ? 'bg-purple-50 dark:bg-purple-950/30 border-purple-100 dark:border-purple-500/20' : 'bg-blue-50 dark:bg-slate-800/50 border-blue-100 dark:border-slate-600/30') + ' p-3 rounded-xl border'
            },
              React.createElement('span', { className: 'text-[8px] font-bold uppercase tracking-widest block mb-1 ' + (hoveredBed.status === 'CLEANING' ? 'text-purple-600 dark:text-purple-300' : 'text-blue-400 dark:text-slate-400') }, 'Tempo Decorrido'),
              React.createElement('div', { className: 'flex items-center gap-2' },
                React.createElement('i', { className: 'ph-bold ph-timer text-xl ' + (hoveredBed.status === 'CLEANING' ? 'text-purple-600 dark:text-purple-400 animate-pulse' : 'text-blue-400 dark:text-slate-400') }),
                React.createElement('span', { className: 'text-xl font-black text-blue-900 dark:text-white font-mono-nums' }, getElapsedDuration(hoveredBed.data && hoveredBed.data.date) || "--")
              ),
              React.createElement('div', { className: 'text-[8px] text-blue-300 dark:text-slate-500 mt-2 font-mono uppercase' },
                'Início: ' + (hoveredBed.data && hoveredBed.data.date ? new Date(hoveredBed.data.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--')
              ),
              hoveredBed.status === 'MAINTENANCE' && hoveredBed.data && hoveredBed.data.reason && React.createElement('div', { className: 'mt-2 text-[9px] font-bold text-rose-600 dark:text-rose-300 italic' },
                '"' + hoveredBed.data.reason + '"'
              )
            ),

            hoveredBed.status === 'OCCUPIED' && React.createElement(React.Fragment, null,
              React.createElement('div', { className: 'mb-3' },
                React.createElement('div', { className: 'text-sm font-black text-blue-900 dark:text-white uppercase leading-tight mb-1' }, (hoveredBed.data && hoveredBed.data.name || 'S/N').toString().replace(/\n/g, '')),
                React.createElement('div', { className: 'text-[10px] font-bold text-blue-400 dark:text-slate-500' }, hoveredBed.data && hoveredBed.data.name ? 'Paciente Internado' : 'Registro Provisório')
              ),
              React.createElement('div', { className: 'grid grid-cols-2 gap-2' },
                React.createElement('div', { className: 'bg-blue-50 dark:bg-slate-900/50 p-2 rounded-lg border border-blue-100 dark:border-slate-800' },
                  React.createElement('span', { className: 'text-[7px] font-bold text-blue-400 dark:text-slate-500 uppercase tracking-widest block mb-0.5' }, 'Convênio'),
                  React.createElement('span', { className: 'text-[10px] font-black text-blue-600 dark:text-cyan-400 uppercase truncate block', title: hoveredBed.data && hoveredBed.data.insurance }, hoveredBed.data && hoveredBed.data.insurance || '-')
                ),
                React.createElement('div', { className: 'bg-blue-50 dark:bg-slate-900/50 p-2 rounded-lg border border-blue-100 dark:border-slate-800' },
                  React.createElement('span', { className: 'text-[7px] font-bold text-blue-400 dark:text-slate-500 uppercase tracking-widest block mb-0.5' }, 'Permanência'),
                  React.createElement('div', { className: 'flex items-center gap-1' },
                    React.createElement('i', { className: 'ph-fill ph-calendar-blank text-amber-500 text-xs' }),
                    React.createElement('span', { className: 'text-[10px] font-black text-amber-600 dark:text-amber-400 uppercase' },
                      getStayDuration(hoveredBed.data && (hoveredBed.data.createdAt || hoveredBed.data.date))
                    )
                  )
                )
              )
            ),

            hoveredBed.status === 'RESERVED' && hoveredBed.data && hoveredBed.data.reason && React.createElement('div', { className: 'text-[10px] font-medium text-amber-300 italic bg-amber-950/20 p-2 rounded-lg border border-amber-500/20 mt-2' },
              '"' + hoveredBed.data.reason + '"'
            )
          )
        ), document.body
      );
    };

    window.App.BedMapTooltip = BedMapTooltip;
  })();
</script>
