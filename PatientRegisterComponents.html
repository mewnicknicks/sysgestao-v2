<script>
  (function() {
    window.App = window.App || {};
    window.App.PatientRegisterComponents = {};

    var PatientRegisterStats = function(props) {
        var stats = props.stats;
        var UI = window.App.UI || {};
        return React.createElement('div', { className: 'nx-kpi-grid-6 mb-8' },
            React.createElement(UI.KPICard, { label: "Registros", data: [{value: stats.registros.hoje, label: "Hoje"}, {value: stats.registros.total, label: "Total"}], icon: "ph-users", theme: "kpi-blue" }),
            React.createElement(UI.KPICard, { label: "Alocados", data: [{value: stats.alocados.hoje, label: "Hoje"}, {value: stats.alocados.total, label: "Total"}], icon: "ph-bed", theme: "kpi-emerald" }),
            React.createElement(UI.KPICard, { label: "Fila de Espera", data: [{value: stats.fila.hoje, label: "Hoje"}, {value: stats.fila.total, label: "Total"}], icon: "ph-hourglass", theme: "kpi-amber", className: stats.fila.total > 0 ? "animate-pulse nx-priority-pulse" : "" }),
            React.createElement(UI.KPICard, { label: "Prioridades", data: [{value: stats.prioridade.hoje, label: "Hoje"}, {value: stats.prioridade.total, label: "Total"}], icon: "ph-star", theme: "kpi-rose" }),
            React.createElement(UI.KPICard, { label: "Estratégicos", data: [{value: stats.estrategicos.hoje, label: "Hoje"}, {value: stats.estrategicos.total, label: "Total"}], icon: "ph-crown", theme: "kpi-purple" }),
            React.createElement(UI.KPICard, { label: "Standard", data: [{value: stats.standard.hoje, label: "Hoje"}, {value: stats.standard.total, label: "Total"}], icon: "ph-users-three", theme: "kpi-cyan" })
        );
    };

    var PatientRegisterForm = function(props) {
        var formData = props.formData;
        var handleInputChange = props.handleInputChange;
        var checkDuplicity = props.checkDuplicity;
        var handleSave = props.handleSave;
        var handleDelete = props.handleDelete;
        var isEditing = props.isEditing;
        var isSubmitting = props.isSubmitting;
        var initialForm = props.initialForm;
        var setFormData = props.setFormData;
        var setIsEditing = props.setIsEditing;
        var formRef = props.formRef;
        var INSURANCE_OPTIONS = props.INSURANCE_OPTIONS;
        var SECTOR_OPTIONS = props.SECTOR_OPTIONS;
        var structure = props.structure;
        var localPatients = props.localPatients;
        var blockedBedsList = props.blockedBedsList;
        var UI = window.App.UI || {};
        var Utils = window.App.Utils || {};

        return React.createElement(UI.Card, { className: 'p-8 h-full' },
            React.createElement('div', { className: 'nx-settings-card-header' },
                React.createElement('i', { className: 'ph-bold ' + (isEditing ? 'ph-pencil-simple text-amber-500' : 'ph-user-plus nx-icon-primary') + ' nx-settings-card-header-icon' }),
                React.createElement('h2', { className: 'nx-settings-card-header-title' }, isEditing ? 'Editar Paciente' : 'Novo Registro'),
                isEditing && React.createElement('span', { className: 'ml-auto text-[10px] font-mono nx-text-label' }, 'ID: ' + formData.id)
            ),
            React.createElement('form', { onSubmit: handleSave, autoComplete: 'off', onKeyDown: Utils.handleEnterNavigation, ref: formRef },
                React.createElement(UI.Input, { label: 'Nome Completo', name: 'name', value: formData.name, onChange: handleInputChange, required: true, icon: 'ph-user' }),
                React.createElement('div', { className: 'grid grid-cols-2 gap-6' },
                    React.createElement(UI.Input, { label: 'Nº Atendimento', name: 'attendance', value: formData.attendance, onChange: handleInputChange, onBlur: checkDuplicity, required: true, icon: 'ph-identification-card' }),
                    React.createElement(UI.SearchableSelect, { label: 'Convênio', name: 'insurance', value: formData.insurance, onChange: handleInputChange, options: INSURANCE_OPTIONS, required: true })
                ),
                React.createElement('div', { className: 'grid grid-cols-2 gap-6' },
                    React.createElement(UI.SearchableSelect, { label: 'Setor', name: 'sector', value: formData.sector, onChange: handleInputChange, options: SECTOR_OPTIONS }),
                    React.createElement(UI.BedSelector, { label: 'Leito', name: 'bed', value: formData.bed, onChange: handleInputChange, sector: formData.sector, structure: structure, patientsList: localPatients, blockedBedsList: blockedBedsList, excludePatientId: isEditing ? formData.id : null, icon: 'ph-bed' })
                ),
                React.createElement('div', { className: 'flex gap-4 mt-6' },
                    React.createElement('button', { type: 'button', onClick: function() { setFormData(initialForm); setIsEditing(false); }, disabled: isSubmitting, className: 'btn-action-cancel flex-1' },
                        isEditing ? 'Cancelar' : 'Limpar'
                    ),
                    React.createElement('button', { type: 'submit', disabled: isSubmitting, className: 'btn-action-confirm flex-[2] group' },
                        React.createElement(React.Fragment, null,
                            isSubmitting ? 'SALVANDO...' : (isEditing ? 'ATUALIZAR' : 'REGISTRAR'),
                            ' ',
                            React.createElement('i', { className: 'ph-bold ' + (isSubmitting ? 'ph-spinner ml-3 animate-spin' : (isEditing ? 'ph-floppy-disk' : 'ph-arrow-right')) + ' ml-3 transition-transform group-hover:translate-x-1' })
                        )
                    )
                ),
                isEditing && React.createElement('div', { className: 'mt-6 text-center' },
                    React.createElement('button', { type: 'button', onClick: function() { handleDelete(formData.id); }, className: 'nx-btn-danger-outline' },
                        React.createElement('i', { className: 'ph-bold ph-trash' }),
                        ' Excluir Registro Permanentemente'
                    )
                )
            )
        );
    };

    var PatientRegisterWaitList = function(props) {
        var waitList = props.waitList;
        var handleEdit = props.handleEdit;
        var handleTogglePriority = props.handleTogglePriority;
        var UI = window.App.UI || {};
        var Utils = window.App.Utils || {};

        return React.createElement(UI.Card, { className: 'p-0 h-full flex flex-col overflow-hidden min-h-[500px]' },
            React.createElement('div', { className: 'nx-settings-list-header' },
                React.createElement('div', { className: 'flex items-center' },
                    React.createElement('i', { className: 'ph-bold ph-hourglass text-amber-500 text-2xl mr-3' }),
                    React.createElement('h2', { className: 'nx-settings-list-title' }, 'Fila de Espera')
                )
            ),
            React.createElement('div', { className: 'flex-1 p-4 overflow-y-auto custom-scrollbar' },
                React.createElement('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-3' },
                    waitList.length > 0 ? waitList.map(function(p) {
                        return React.createElement('div', { key: p.id, onClick: function() { handleEdit(p); }, className: 'nx-waitlist-card group cursor-pointer ' + (p.priority ? 'nx-priority-pulse' : '') },
                            p.priority && React.createElement('i', { className: 'ph-fill ph-star nx-waitlist-priority-icon' }),
                            React.createElement('div', { className: 'flex flex-col mb-3' },
                                React.createElement('h4', { className: 'nx-waitlist-name' }, p.name),
                                React.createElement('span', { className: 'nx-text-label mt-1' }, p.insurance)
                            ),
                            React.createElement('div', { className: 'mt-auto' },
                                React.createElement('div', { className: 'flex flex-wrap gap-2 mb-3' },
                                    React.createElement('span', { className: 'nx-badge-neutral' }, 'AT:' + p.attendance),
                                    React.createElement('span', { className: 'nx-badge-neutral' }, p.sector || 'N/A')
                                ),
                                React.createElement('div', { className: 'nx-waitlist-footer' },
                                    React.createElement('div', { className: 'nx-waitlist-date' },
                                        React.createElement('i', { className: 'ph-bold ph-calendar-blank' }),
                                        Utils.formatDateBr(p.createdAt)
                                    ),
                                    React.createElement('button', { onClick: function(e) { e.stopPropagation(); handleTogglePriority(p); }, className: 'nx-waitlist-priority-btn ' + (p.priority ? 'active' : '') }, p.priority ? 'DESPRIORIZAR' : 'PRIORIZAR')
                                )
                            )
                        );
                    }) : React.createElement('div', { className: 'nx-waitlist-empty' },
                        React.createElement('svg', { className: 'nx-waitlist-empty-icon', fill: 'none', viewBox: '0 0 24 24', stroke: 'currentColor', strokeWidth: '1' },
                            React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', d: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' })
                        ),
                        React.createElement('p', { className: 'nx-waitlist-empty-title' }, 'Fila Zerada'),
                        React.createElement('p', { className: 'nx-waitlist-empty-text' }, 'Nenhum paciente aguardando leito no momento.')
                    )
                )
            )
        );
    };

    var PatientRegisterDatabaseModal = function(props) {
        var showDbModal = props.showDbModal;
        var setShowDbModal = props.setShowDbModal;
        var dbFilters = props.dbFilters;
        var setDbFilters = props.setDbFilters;
        var INSURANCE_OPTIONS = props.INSURANCE_OPTIONS;
        var filteredDbList = props.filteredDbList;
        var handleTogglePriority = props.handleTogglePriority;
        var handleEdit = props.handleEdit;
        var handleDelete = props.handleDelete;
        var copyToClipboard = props.copyToClipboard;
        var UI = window.App.UI || {};
        var Utils = window.App.Utils || {};

        return React.createElement(UI.Modal, { isOpen: showDbModal, onClose: function() { setShowDbModal(false); }, size: 'large', title: 'Banco de Dados de Pacientes' },
            React.createElement('div', { className: 'flex flex-col h-full max-h-[80vh]' },
                React.createElement('div', { className: 'px-6 py-4 nx-form-section grid grid-cols-1 md:grid-cols-4 gap-4' },
                    React.createElement(UI.Input, { type: 'date', label: 'Data Inicial', value: dbFilters.startDate, onChange: function(e) { setDbFilters({...dbFilters, startDate: e.target.value}); }, className: '!mb-0' }),
                    React.createElement(UI.Input, { type: 'date', label: 'Data Final', value: dbFilters.endDate, onChange: function(e) { setDbFilters({...dbFilters, endDate: e.target.value}); }, className: '!mb-0' }),
                    React.createElement(UI.SearchableSelect, { label: 'Convênio', value: dbFilters.insurance, onChange: function(e) { setDbFilters({...dbFilters, insurance: e.target.value}); }, options: INSURANCE_OPTIONS, className: '!mb-0' }),
                    React.createElement(UI.Input, { label: 'Pesquisar...', value: dbFilters.search, onChange: function(e) { setDbFilters({...dbFilters, search: e.target.value}); }, className: '!mb-0', icon: 'ph-magnifying-glass' })
                ),
                React.createElement('div', { className: 'flex-1 overflow-auto custom-scrollbar p-0 nx-table-container' },
                    React.createElement('div', { className: 'nx-glass-table-wrapper rounded-none border-none shadow-none min-h-[300px]' },
                        React.createElement('table', { className: 'nx-glass-table w-full' },
                            React.createElement('thead', { className: 'sticky top-0 z-10 shadow-md' },
                                React.createElement('tr', null,
                                    React.createElement('th', { className: 'w-16 text-center py-3' }, 'Prioridade'),
                                    React.createElement('th', { className: 'text-center py-3' }, 'Data / Hora'),
                                    React.createElement('th', { className: 'text-center py-3' }, 'Atend.'),
                                    React.createElement('th', { className: 'text-center py-3 pl-4' }, 'Paciente'),
                                    React.createElement('th', { className: 'text-center py-3' }, 'Setor/Leito'),
                                    React.createElement('th', { className: 'text-center py-3' }, 'Ações')
                                )
                            ),
                            React.createElement('tbody', null,
                                filteredDbList.length > 0 ? filteredDbList.map(function(p) {
                                    let statusBadge = null;
                                    const sUpper = String(p.dischargeStatus || '').toUpperCase();
                                    if (sUpper === 'OBITO') statusBadge = React.createElement('span', { className: 'ml-2 text-[8px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded border border-slate-600' }, 'ÓBITO');
                                    else if (['ALTA', 'SIM'].includes(sUpper)) statusBadge = React.createElement('span', { className: 'ml-2 text-[8px] bg-emerald-900/30 text-emerald-400 px-1.5 py-0.5 rounded border border-emerald-900/50' }, 'ALTA');
                                    const timeStr = p.createdAt ? new Date(p.createdAt).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : '';
                                    let bedHistoryTooltip = "Sem histórico";
                                    try {
                                        const raw = typeof p.bedHistory === 'string' ? JSON.parse(p.bedHistory) : p.bedHistory;
                                        if(Array.isArray(raw) && raw.length > 0) {
                                            const cleanHist = raw.map(h => typeof h === 'object' ? h.bed : h).filter(Boolean);
                                            bedHistoryTooltip = "Histórico: " + cleanHist.join(' ➔ ') + (p.bed ? ' ➔ ' + p.bed : '');
                                        }
                                    } catch(e){}

                                    return React.createElement('tr', { key: p.id, className: 'nx-glass-table-row' },
                                        React.createElement('td', { className: 'text-center' },
                                            React.createElement('button', { onClick: function() { handleTogglePriority(p); }, className: p.priority ? 'text-rose-500' : 'text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300' },
                                                React.createElement('i', { className: 'ph-fill ' + (p.priority ? 'ph-star' : 'ph-star') + ' text-lg' })
                                            )
                                        ),
                                        React.createElement('td', { className: 'text-center' },
                                            React.createElement('div', { className: 'font-mono text-xs text-slate-500 dark:text-slate-400' }, Utils.formatDateBr(p.createdAt)),
                                            React.createElement('div', { className: 'font-mono text-[9px] text-slate-600 dark:text-slate-500' }, timeStr)
                                        ),
                                        React.createElement('td', { className: 'text-center font-mono text-xs text-slate-600 dark:text-slate-400 hover:text-cyan-400 cursor-pointer transition-colors', onClick: function() { copyToClipboard(p.attendance); }, title: 'Copiar' }, p.attendance),
                                        React.createElement('td', { className: 'text-center pl-4' },
                                            React.createElement('div', { className: 'flex flex-col items-center' },
                                                React.createElement('div', { className: 'flex items-center justify-center' },
                                                    React.createElement('span', { className: 'font-bold nx-text-heading uppercase text-xs hover:text-cyan-400 cursor-pointer transition-colors', onClick: function() { copyToClipboard(p.name); } }, p.name),
                                                    statusBadge
                                                ),
                                                React.createElement('span', { className: 'nx-text-label font-bold' }, p.insurance)
                                            )
                                        ),
                                        React.createElement('td', { className: 'text-center' },
                                            React.createElement('div', { className: 'flex flex-col items-center' },
                                                React.createElement('span', { className: 'nx-text-label font-bold uppercase' }, p.sector),
                                                React.createElement('span', { className: 'text-xs font-black cursor-help ' + (p.bed ? 'text-cyan-400' : 'text-amber-500'), title: bedHistoryTooltip }, p.bed || 'S/L')
                                            )
                                        ),
                                        React.createElement('td', { className: 'text-center' },
                                            React.createElement('div', { className: 'flex items-center justify-center gap-2' },
                                                React.createElement('button', { onClick: function() { handleEdit(p); }, className: 'nx-settings-action-btn', title: 'Editar' },
                                                    React.createElement('i', { className: 'ph-bold ph-pencil-simple text-lg' })
                                                ),
                                                React.createElement('button', { onClick: function() { handleDelete(p.id); }, className: 'nx-settings-action-btn delete', title: 'Excluir' },
                                                    React.createElement('i', { className: 'ph-bold ph-trash text-lg' })
                                                )
                                            )
                                        )
                                    );
                                }) : React.createElement('tr', null, React.createElement('td', { colSpan: '6', className: 'py-12 text-center text-slate-500 dark:text-slate-400 italic text-xs' }, 'Nenhum registro encontrado.'))
                            )
                        )
                    )
                ),
                React.createElement('div', { className: 'nx-glass-table-footer' }, 'Total: ', filteredDbList.length)
            )
        );
    };

    window.App.PatientRegisterComponents = {
        PatientRegisterStats,
        PatientRegisterForm,
        PatientRegisterWaitList,
        PatientRegisterDatabaseModal
    };
  })();
</script>
